0\u2013200 downloads per episode<\/b> with a basic $5\u201310 CPM sponsorship deal.<\/div>\n        <\/div>\n        <div class=\"insight\">\n          <div class=\"insight-stat\" style=\"color:var(--c2)\">47%<\/div>\n          <div class=\"insight-title\">Listeners who'd quit over AI voice<\/div>\n          <div class=\"insight-body\">Edison Research 2024: <b>47% of podcast listeners would stop listening<\/b> if they detected the host was using an AI-generated voice. This is why Brett's real voice is non-negotiable in C1. The AI writes the script, schedules delivery, edits audio \u2014 but Brett records. Even 20\u201330 minutes of his voice recording is what the audience is actually subscribing to.<\/div>\n        <\/div>\n        <div class=\"insight\">\n          <div class=\"insight-stat\" style=\"color:var(--c3)\">70+<\/div>\n          <div class=\"insight-title\">Active AI copyright lawsuits in the US<\/div>\n          <div class=\"insight-body\">There are 70+ live AI copyright cases in US courts \u2014 mostly against image generators (Stability AI, Midjourney) and LLMs (OpenAI, Anthropic). But <b>Morning Brew, Axios, and 1440<\/b> are all operating safely: they summarise and rewrite in original voice, link to sources, and never reproduce verbatim. That's the legal template this pipeline follows.<\/div>\n        <\/div>\n      <\/div>\n      <div class=\"tip\"><b>Delivery note:<\/b> Walk through these quickly \u2014 20 sec each. They're credibility signals, not the main story. Don't get into a deep dive unless Brett asks.<\/div>\n    <\/div>\n  <\/div>\n\n  <div id=\"note-c1-concept\" class=\"slide b-c1\">\n    <div class=\"slide-header\">\n      <span class=\"slide-name\">Concept \u2014 5-step pipeline<\/span>\n      <span class=\"slide-meta\">60 sec<\/span>\n    <\/div>\n    <div class=\"slide-body\">\n      <div class=\"say\">\"Morning scan \u2014 AI monitors your 14 sources overnight. You wake up, pick 3\u20135 stories, add your notes \u2014 15 minutes. AI drafts a full script. You review and edit. Record 20\u201330 minutes in your voice. One-click publish to Spotify, Apple, YouTube simultaneously.\"<\/div>\n      <div class=\"say\"><i>Key line to land:<\/i> <b>\"AI is invisible infrastructure. Brett is the product.\"<\/b><\/div>\n      <div class=\"context\">\n        <div class=\"context-label\">Walk the 5 steps in detail if Brett asks<\/div>\n        <p><b>Step 1 \u2014 Morning Scan (automated):<\/b> n8n workflow runs overnight, pulls headlines from Brett's 14 RSS/newsletter sources, ranks by topic overlap and novelty, delivers a briefing to Brett's inbox by 7am.<br><br>\n        <b>Step 2 \u2014 Brett's 15-min edit:<\/b> Brett opens the briefing, selects 3\u20135 stories, adds 1\u20132 line voice notes per story (\"my take is\u2026\"). This is the only human step in the pipeline \u2014 and it's what makes the content his.<br><br>\n        <b>Step 3 \u2014 AI script draft (GPT-4o):<\/b> The selected stories + Brett's notes go into a structured prompt. GPT-4o produces a ~1,500-word script in Brett's documented voice style. Takes 45 seconds.<br><br>\n        <b>Step 4 \u2014 Brett records:<\/b> 20\u201330 minutes. No editing needed during recording \u2014 the script is structured so he reads through once. ElevenLabs can handle intros/outros if needed.<br><br>\n        <b>Step 5 \u2014 One-click publish:<\/b> Buzzsprout auto-distributes to Spotify, Apple Podcasts, YouTube, and generates show notes + social clips automatically.<\/p>\n      <\/div>\n      <div class=\"context\">\n        <div class=\"context-label\">Why this framing matters<\/div>\n        <p>Brett's audience follows him for his judgment, his voice, his worldview \u2014 not for an AI summary. The pipeline doesn't change the product. It changes the time cost from 4\u20138 hours to <b>45\u201360 minutes total<\/b>. If Brett feels like the concept is about replacing him, that's the wrong read \u2014 the AI is purely downstream of his editorial decision.<\/p>\n      <\/div>\n    <\/div>\n  <\/div>\n\n  <div id=\"note-c1-scorecard\" class=\"slide b-c1\">\n    <div class=\"slide-header\">\n      <span class=\"slide-name\">Scorecard \u2014 13/20<\/span>\n      <span class=\"slide-meta\">60 sec \u2014 read the limitation out loud<\/span>\n    <\/div>\n    <div class=\"slide-body\">\n      <div class=\"score-row\">\n        <div class=\"score-pill\"><div class=\"score-num\" style=\"color:var(--c3)\">3/5<\/div><div class=\"score-label\">Impact<\/div><\/div>\n        <div class=\"score-pill\"><div class=\"score-num\" style=\"color:var(--c2)\">2/5<\/div><div class=\"score-label\">Innovation<\/div><\/div>\n        <div class=\"score-pill\"><div class=\"score-num\" style=\"color:var(--green)\">5/5<\/div><div class=\"score-label\">Feasibility<\/div><\/div>\n        <div class=\"score-pill\"><div class=\"score-num\" style=\"color:var(--c3)\">3/5<\/div><div class=\"score-label\">Business<\/div><\/div>\n      <\/div>\n      <div class=\"say\">\"Feasibility 5/5 \u2014 everything is production-ready, you could prototype in days. But Innovation 2/5 \u2014 I'll be straight with you: <b>this is the obvious solution, and multiple platforms already do parts of this.<\/b> The honest limitation: it solves production, not differentiation. 'Why would anyone listen to Brett's podcast instead of the other 4 million shows?' is not answered by the pipeline.\"<\/div>\n      <div class=\"context\">\n        <div class=\"context-label\">Score-by-score explanation \u2014 if Brett asks<\/div>\n        <p><b>Impact 3/5:<\/b> Solves a real problem (production time) but the output is still a podcast in a saturated market. Meaningful impact on Brett's workflow, limited impact on audience differentiation.<br><br>\n        <b>Innovation 2/5:<\/b> Honest score. Wondercraft, Podcastle, Adobe Podcast, and Descript all do parts of this already. The composable pipeline is clever but not novel. Multiple competitors will close this gap in 12 months.<br><br>\n        <b>Feasibility 5/5:<\/b> Every tool exists off the shelf today. No custom dev needed. Could be prototyped in 3\u20135 days. n8n has pre-built RSS and GPT connectors. Buzzsprout API is well-documented.<br><br>\n        <b>Business 3/5:<\/b> Podcast CPMs run $15\u2013$25. At 1,000 downloads/ep, that's $15\u2013$25/ep \u2014 viable but not exciting. Growth is slow. Monetisation depends entirely on audience size, which takes 12\u201318 months to build.<\/p>\n      <\/div>\n      <div class=\"context\">\n        <div class=\"context-label\">Why reading the limitation out loud builds more trust than anything else<\/div>\n        <p>Most presentations hide weaknesses. Reading them explicitly shows Brett you're doing real analysis, not pitching. It also correctly sets up C2 and C3 as having answers to the differentiation question that C1 simply doesn't.<\/p>\n      <\/div>\n    <\/div>\n  <\/div>\n\n  <div class=\"transition\">\u2192 <b>Transition:<\/b> \"C1 solves the how \u2014 the production bottleneck. Concept 2 asks a completely different question: what if we built something nobody's ever seen in this space?\"<\/div>\n<\/div>\n\n\n<!-- C2 -->\n<div class=\"section\">\n  <div class=\"section-title\"><div class=\"dot c2\"><\/div> C2 \u2014 The Curiosity Game<\/div>\n\n  <div id=\"note-c2-title\" class=\"slide b-c2\">\n    <div class=\"slide-header\">\n      <span class=\"slide-name\">Title slide<\/span>\n      <span class=\"slide-meta\">30 sec \u2014 shift your energy here<\/span>\n    <\/div>\n    <div class=\"slide-body\">\n      <div class=\"say\">\"The Curiosity Game. A daily 3-minute game that turns science and quirky stories into <b>social currency<\/b> \u2014 making you the most interesting person at lunch.\"<\/div>\n      <div class=\"context\">\n        <div class=\"context-label\">Energy shift \u2014 this should feel different from C1<\/div>\n        <p>C1 was analytical, measured. C2 is the exciting one \u2014 the highest-scoring concept of the three. Lean into it. The phrase <b>\"social currency\"<\/b> is the hook: the product isn't about learning for learning's sake, it's about having something genuinely interesting to say to other people. That's a very different motivation from \"I want to be educated.\"<\/p>\n      <\/div>\n    <\/div>\n  <\/div>\n\n  <div id=\"note-c2-problem\" class=\"slide b-c2\">\n    <div class=\"slide-header\">\n      <span class=\"slide-name\">Problem \u2014 64% of Americans are doomscrollers<\/span>\n      <span class=\"slide-meta\">45 sec<\/span>\n    <\/div>\n    <div class=\"slide-body\">\n      <div class=\"say\">\"<b>64% of Americans identify as doomscrollers<\/b> \u2014 2+ hours a day on feeds that actively reduce life satisfaction. 60% open their phone intending to learn, not scroll. And there are <b>zero products<\/b> that make learning as easy and habit-forming as scrolling.\"<\/div>\n      <div class=\"context\">\n        <div class=\"context-label\">Let \"zero\" land \u2014 pause after it<\/div>\n        <p>The white space claim is the most powerful thing in this slide. It's not \"we're better than Duolingo\" \u2014 it's \"this <b>specific combination doesn't exist anywhere<\/b>.\" That's a market claim, not a product claim. Brett will understand the significance of that immediately \u2014 it means there's no obvious incumbent to compete against.<\/p>\n      <\/div>\n    <\/div>\n  <\/div>\n\n  <div id=\"note-c2-insights\" class=\"slide b-c2\">\n    <div class=\"slide-header\">\n      <span class=\"slide-name\">4 Insights<\/span>\n      <span class=\"slide-meta\">90 sec<\/span>\n    <\/div>\n    <div class=\"slide-body\">\n      <div class=\"insight-grid\">\n        <div class=\"insight\">\n          <div class=\"insight-stat\" style=\"color:var(--c2)\">272<\/div>\n          <div class=\"insight-title\">Studies confirming the Testing Effect<\/div>\n          <div class=\"insight-body\"><b>What the testing effect is:<\/b> Also called retrieval practice \u2014 the finding that being <b>tested on information makes you retain 25\u201350% more<\/b> than reading passively. Across 272 studies, this is one of the most replicated findings in all of cognitive science.<br><br><b>Why it matters here:<\/b> The quiz mechanic isn't a gimmick \u2014 it's built on decades of psychology research. Every question in the Curiosity Game is an active memory intervention, not entertainment.<\/div>\n        <\/div>\n        <div class=\"insight\">\n          <div class=\"insight-stat\" style=\"color:var(--c1)\">4.5\u00d7<\/div>\n          <div class=\"insight-title\">Duolingo DAU growth in 3 years<\/div>\n          <div class=\"insight-body\"><b>What happened:<\/b> Duolingo went from ~7M to ~32M daily active users by doubling down on streaks, push notifications, competitive leaderboards, and character-driven shame mechanics (\"Duo the owl is disappointed in you\"). <b>Streaks alone triple daily return rates.<\/b><br><br>This isn't a new app \u2014 it's over 10 years old. The mechanics are proven at scale. C2 applies the same loop to a different domain: curiosity and science, not language.<\/div>\n        <\/div>\n        <div class=\"insight\">\n          <div class=\"insight-stat\" style=\"color:var(--green)\">15+<\/div>\n          <div class=\"insight-title\">Products scanned \u2014 white space confirmed<\/div>\n          <div class=\"insight-body\">We mapped: Duolingo, Blinkist, Morning Brew, The Hustle, Trivia Crack, Kahoot, Brilliant, Quizlet, Sporcle, and more. <b>Nobody combines: daily cadence + science/quirky stories + quiz + shareable results.<\/b><br><br>Closest competitor: Columbia University's Science Scramble. <b>Archived February 2024 \u2014 it's dead.<\/b> The space is open right now.<\/div>\n        <\/div>\n        <div class=\"insight\">\n          <div class=\"insight-stat\" style=\"color:var(--c3)\">$10M/mo<\/div>\n          <div class=\"insight-title\">Mark Rober / CrunchLabs model<\/div>\n          <div class=\"insight-body\"><b>What CrunchLabs is:<\/b> Mark Rober (50M YouTube subscribers, known for engineering experiments) launched a STEM toy subscription box. He converted a small fraction of his existing audience into paying subscribers \u2014 no paid acquisition \u2014 and scaled to roughly <b>$10M/month in revenue<\/b>.<br><br><b>The parallel for Brett:<\/b> He has a built-in audience. At just <b>0.05% conversion, that's 5,000\u201320,000 installs with zero ad spend.<\/b><\/div>\n        <\/div>\n      <\/div>\n    <\/div>\n  <\/div>\n\n  <div id=\"note-c2-concept\" class=\"slide b-c2\">\n    <div class=\"slide-header\">\n      <span class=\"slide-name\">Concept \u2014 the daily loop<\/span>\n      <span class=\"slide-meta\">60 sec<\/span>\n    <\/div>\n    <div class=\"slide-body\">\n      <div class=\"say\">\"Morning push notification: 'Today's curiosity drop is live.' You open it \u2014 quirky setup, one science question, you make a prediction. Brett's commentary reveals the real answer. Track your streak, see how your friends did, share at lunch: <b>'I got 4 out of 5 \u2014 beat me.'<\/b>\"<\/div>\n      <div class=\"context\">\n        <div class=\"context-label\">Walk the loop in detail if Brett asks<\/div>\n        <p><b>Step 1 \u2014 Daily push (7am):<\/b> App sends a push notification. One tap opens the day's drop. No friction \u2014 the entire experience is 3 minutes on a phone screen.<br><br>\n        <b>Step 2 \u2014 The setup:<\/b> A short, surprising premise. \"Flamingos are born grey. They turn pink because of what they eat. What do you think that is?\" Sets curiosity before the question lands.<br><br>\n        <b>Step 3 \u2014 The question + prediction:<\/b> One multiple-choice question. User locks in their answer before seeing the result \u2014 this is the retrieval practice moment. The moment of prediction is what activates the memory encoding.<br><br>\n        <b>Step 4 \u2014 Brett's reveal:<\/b> The answer drops with Brett's commentary \u2014 his voice, his angle, a follow-up fact. This is the content layer. Not just \"the answer is carotenoids\" but \"here's why this is weirder than you think.\"<br><br>\n        <b>Step 5 \u2014 Social layer:<\/b> Your streak updates. Friend scores appear. A shareable card generates: \"Today's curiosity: flamingos \ud83e\udda9 \u2014 I got it, did you?\" Posts to WhatsApp, Instagram Stories, X. This is the organic growth engine.<\/p>\n      <\/div>\n      <div class=\"context\">\n        <div class=\"context-label\">What kind of questions? (If Brett asks)<\/div>\n        <p>Think: \"Why do flamingos stand on one leg?\" or \"What percentage of the ocean floor has been mapped?\" or \"Why does time feel faster as you get older?\" \u2014 <b>quirky, surprising, conversation-worthy<\/b>. Not trivia night trivia \u2014 genuine discovery moments that make you feel smarter and want to tell someone.<\/p>\n      <\/div>\n    <\/div>\n  <\/div>\n\n  <div id=\"note-c2-scorecard\" class=\"slide b-c2\">\n    <div class=\"slide-header\">\n      <span class=\"slide-name\">Scorecard \u2014 16/20 \u2605 Highest of the three<\/span>\n      <span class=\"slide-meta\">75 sec<\/span>\n    <\/div>\n    <div class=\"slide-body\">\n      <div class=\"score-row\">\n        <div class=\"score-pill\"><div class=\"score-num\" style=\"color:var(--green)\">4/5<\/div><div class=\"score-label\">Impact<\/div><\/div>\n        <div class=\"score-pill\"><div class=\"score-num\" style=\"color:var(--green)\">5/5<\/div><div class=\"score-label\">Innovation<\/div><\/div>\n        <div class=\"score-pill\"><div class=\"score-num\" style=\"color:var(--c3)\">3/5<\/div><div class=\"score-label\">Feasibility<\/div><\/div>\n        <div class=\"score-pill\"><div class=\"score-num\" style=\"color:var(--green)\">4/5<\/div><div class=\"score-label\">Business<\/div><\/div>\n      <\/div>\n      <div class=\"say\">\"<b>16/20 \u2014 highest score of the three.<\/b> Innovation 5/5 \u2014 nobody owns this space. Feasibility 3/5 is the honest trade-off: needs interactive frontend, game mechanics, a content pipeline. Business 4/5 \u2014 dual revenue path: B2C freemium plus B2B corporate learning licensing in a $2.6B market growing 4x by 2032.\"<\/div>\n      <div class=\"context\">\n        <div class=\"context-label\">Score-by-score explanation \u2014 if Brett asks<\/div>\n        <p><b>Impact 4/5:<\/b> Replaces doomscrolling with active recall \u2014 meaningful behaviour change, not just content consumption. Affects how people actually process information daily. The social sharing layer means organic reach without ad spend.<br><br>\n        <b>Innovation 5/5:<\/b> Perfect score. We mapped 15+ products. Nobody combines daily cadence + science/quirky content + retrieval practice quiz + shareable social result. The closest competitor (Columbia's Science Scramble) archived in February 2024. White space is confirmed.<br><br>\n        <b>Feasibility 3/5:<\/b> This is the honest constraint. Needs a native or PWA frontend, push notification infrastructure, streak/leaderboard mechanics, and a daily content pipeline. That's 6\u20138 weeks of engineering minimum before you can test retention. Contrast with C3 which can be tested in 1 week with zero code.<br><br>\n        <b>Business 4/5:<\/b> Two revenue streams. B2C: freemium with premium streaks/stats at $4.99/mo. B2B: corporate learning licensing (Kahoot model) \u2014 70% of Fortune 500 use quiz tools for engagement. The $2.6B corporate learning market is growing 4x by 2032. This is the bigger prize.<\/p>\n      <\/div>\n      <div class=\"tip\"><b>Key question to ask Brett:<\/b> \"Does gamification fit your brand? And is the B2B corporate learning angle interesting to you, or do you want a pure consumer product?\"<\/div>\n    <\/div>\n  <\/div>\n\n  <div class=\"transition\">\u2192 <b>Transition:<\/b> \"Concept 3 takes a completely different approach. Not a pipeline, not a game \u2014 a fundamentally new way to consume and remember news. And this one is our team recommendation.\"<\/div>\n<\/div>\n\n\n<!-- C3 -->\n<div class=\"section\">\n  <div class=\"section-title\"><div class=\"dot c3\"><\/div> C3 \u2014 The Dinner Table Drop<\/div>\n\n  <div id=\"note-c3-title\" class=\"slide b-c3\">\n    <div class=\"slide-header\">\n      <span class=\"slide-name\">Title slide<\/span>\n      <span class=\"slide-meta\">30 sec<\/span>\n    <\/div>\n    <div class=\"slide-body\">\n      <div class=\"say\">\"<b>This is our team recommendation.<\/b> A weekly news tracker that uses learning science to help people actually understand and remember what's happening in the world \u2014 not just scroll past it.\"<\/div>\n      <div class=\"context\">\n        <div class=\"context-label\">Say \"team recommendation\" explicitly \u2014 own it<\/div>\n        <p>It signals conviction. Brett will hear this slide differently from the other two. You're not presenting an option \u2014 you're making a call. He'll pay closer attention to your reasoning for why this is the pick, and it invites him to either agree or push back \u2014 both are good outcomes.<\/p>\n      <\/div>\n    <\/div>\n  <\/div>\n\n  <div id=\"note-c3-problem\" class=\"slide b-c3\">\n    <div class=\"slide-header\">\n      <span class=\"slide-name\">Problem \u2014 1 in 16 headlines recalled after a full newscast<\/span>\n      <span class=\"slide-meta\">60 sec \u2014 let the stat land<\/span>\n    <\/div>\n    <div class=\"slide-body\">\n      <div class=\"say\">\"After watching a <b>full newscast<\/b>, the average viewer recalls <b>just 1 in 16 headlines<\/b>. Within a week, readers forget over half of what they read. 75% of Americans are overconfident about their news judgment \u2014 they think they're informed, but they're not. And 40% of global audiences now <b>actively avoid news<\/b> \u2014 not from apathy, but from overwhelm.\"<\/div>\n      <div class=\"context\">\n        <div class=\"context-label\">Where the 1-in-16 number comes from \u2014 and why it's shocking<\/div>\n        <p>This comes from Cambridge University research on broadcast news retention. A typical TV newscast covers roughly 16 stories. The average viewer walks away remembering 1. Not because they weren't paying attention \u2014 but because <b>passive consumption with no recall mechanism produces almost zero long-term retention<\/b>. People feel informed because they watched the news. They're not. This is the scientific foundation of why the Wednesday quiz in C3 is such a meaningful intervention.<\/p>\n      <\/div>\n    <\/div>\n  <\/div>\n\n  <div id=\"note-c3-insights\" class=\"slide b-c3\">\n    <div class=\"slide-header\">\n      <span class=\"slide-name\">4 Insights<\/span>\n      <span class=\"slide-meta\">90 sec<\/span>\n    <\/div>\n    <div class=\"slide-body\">\n      <div class=\"insight-grid\">\n        <div class=\"insight\">\n          <div class=\"insight-stat\" style=\"color:var(--green)\">77%<\/div>\n          <div class=\"insight-title\">Less forgetting with spaced repetition<\/div>\n          <div class=\"insight-body\"><b>What spaced repetition is:<\/b> A learning technique where material is re-surfaced at increasing intervals \u2014 timed for right before you'd naturally forget it. Used in Anki (language learning), medical school curricula, and military training programs.<br><br><b>The result:<\/b> Passive readers forget <b>56% of what they read within a week<\/b>. Readers who are re-tested? Only 13% forget. That's a 77% reduction in forgetting from one simple intervention: showing the story again on Wednesday with a quiz attached.<\/div>\n        <\/div>\n        <div class=\"insight\">\n          <div class=\"insight-stat\" style=\"color:var(--c2)\">75%<\/div>\n          <div class=\"insight-title\">Overconfident about news judgment<\/div>\n          <div class=\"insight-body\"><b>What the research shows:<\/b> Reuters Institute research found <b>75% of social media news consumers overestimate how informed they actually are<\/b>. Scrolling creates an illusion of being informed \u2014 you saw the headline, formed an opinion, shared it \u2014 but you can't actually explain the story, the context, or the key facts.<br><br>C3 is solving for that gap between feeling informed and <b>actually being informed.<\/b><\/div>\n        <\/div>\n        <div class=\"insight\">\n          <div class=\"insight-stat\" style=\"color:var(--c3)\">40%<\/div>\n          <div class=\"insight-title\">Global news avoidance rate<\/div>\n          <div class=\"insight-body\">Reuters Digital News Report 2024: <b>40% of global audiences actively avoid news<\/b>, up from 29% in 2017. Main reasons: too depressing, too overwhelming, feels untrustworthy.<br><br>But <b>Tortoise Media<\/b> (UK slow-journalism outlet) proved the opposite model works \u2014 they went deep on fewer stories, added member discussion forums, and built a <b>110,000+ paying subscriber base<\/b>. Depth over velocity is a validated market position.<\/div>\n        <\/div>\n        <div class=\"insight\">\n          <div class=\"insight-stat\" style=\"color:var(--purple)\">50+<\/div>\n          <div class=\"insight-title\">Products scanned \u2014 white space confirmed<\/div>\n          <div class=\"insight-body\">Mapped 50+ news products: The Economist, Bloomberg, Politico, Axios, Morning Brew, Ground News, 1440, AllSides, Flipboard, Substack, Beehiiv, The Browser, etc.<br><br><b>Zero combine: spaced repetition + quizzes on current news + editorial curation + source transparency.<\/b> Each element exists somewhere. The combination is the moat \u2014 and it doesn't exist yet.<\/div>\n        <\/div>\n      <\/div>\n    <\/div>\n  <\/div>\n\n  <div id=\"note-c3-concept\" class=\"slide b-c3\">\n    <div class=\"slide-header\">\n      <span class=\"slide-name\">Concept \u2014 the weekly rhythm<\/span>\n      <span class=\"slide-meta\">75 sec \u2014 slow down here<\/span>\n    <\/div>\n    <div class=\"slide-body\">\n      <div class=\"say\">\"<b>Monday:<\/b> 3 curated stories with Brett's take \u2014 why this matters, what to watch. <b>Wednesday:<\/b> those same 3 stories come back as a quiz on key facts \u2014 this is the spaced repetition layer, timed specifically for maximum retention. <b>Friday:<\/b> 'Here's what actually mattered this week' \u2014 synthesis. Plus deep dives with full source maps and a prediction tracker where readers stake their call and track accuracy over time.\"<\/div>\n      <div class=\"say\"><i>The line to land:<\/i> <b>\"Everyone else reacts in 5 minutes. We react in 5 days.\"<\/b><\/div>\n      <div class=\"context\">\n        <div class=\"context-label\">Walk the weekly rhythm in detail if Brett asks<\/div>\n        <p><b>Monday \u2014 The Drop:<\/b> 3 stories Brett has been tracking. Each one gets: a 2-paragraph plain-English summary, Brett's specific take (\"here's what most people are missing\"), and a \"watch for\" flag \u2014 what to look for as this story develops. Delivered via Beehiiv newsletter, ~5 min read.<br><br>\n        <b>Wednesday \u2014 The Quiz:<\/b> Those same 3 Monday stories return as 3 questions. \"Last Monday we covered X. Quick check: what was the key number?\" This is the spaced repetition trigger \u2014 48 hours is the optimal interval on the Ebbinghaus forgetting curve. One Google Form or embedded quiz. Takes 90 seconds. This step is the entire product differentiation.<br><br>\n        <b>Friday \u2014 The Synthesis:<\/b> \"Here's what actually mattered.\" Brett reviews what landed, what changed, what he got wrong. Plus a prediction: \"My call for next week is X \u2014 reply and tell me yours.\" Tracks reader accuracy over time \u2014 builds a \"prediction leaderboard\" that creates identity and retention.<br><br>\n        <b>Deep Dives (monthly):<\/b> One story per month gets a full source map \u2014 all 8\u201312 sources Brett used, annotated with why each one matters. Transparency as product feature. Paid tier unlock.<\/p>\n      <\/div>\n      <div class=\"context\">\n        <div class=\"context-label\">Why the Wednesday resurface is the entire product<\/div>\n        <p>Without the Wednesday quiz, this is a well-written newsletter \u2014 and there are thousands of those. The Wednesday step is what makes C3 a <b>learning system, not a content product<\/b>. The 3-touch cadence is based on the Ebbinghaus forgetting curve: re-surface at exactly the point the brain is about to let the information go. No news product does this.<\/p>\n      <\/div>\n    <\/div>\n  <\/div>\n\n  <div id=\"note-c3-scorecard\" class=\"slide b-c3\">\n    <div class=\"slide-header\">\n      <span class=\"slide-name\">Scorecard \u2014 15/20<\/span>\n      <span class=\"slide-meta\">75 sec<\/span>\n    <\/div>\n    <div class=\"slide-body\">\n      <div class=\"score-row\">\n        <div class=\"score-pill\"><div class=\"score-num\" style=\"color:var(--green)\">4/5<\/div><div class=\"score-label\">Impact<\/div><\/div>\n        <div class=\"score-pill\"><div class=\"score-num\" style=\"color:var(--green)\">4/5<\/div><div class=\"score-label\">Innovation<\/div><\/div>\n        <div class=\"score-pill\"><div class=\"score-num\" style=\"color:var(--green)\">4/5<\/div><div class=\"score-label\">Feasibility<\/div><\/div>\n        <div class=\"score-pill\"><div class=\"score-num\" style=\"color:var(--c3)\">3/5<\/div><div class=\"score-label\">Business<\/div><\/div>\n      <\/div>\n      <div class=\"say\">\"Innovation 4/5 \u2014 spaced repetition applied to current news is genuinely novel. Feasibility 4/5 \u2014 most achievable of the three: core product is curated content plus scheduled email delivery, testable in a week. Business 3/5 \u2014 honest trade-off: only 18\u201320% of people pay for news. But at 6\u201312% free-to-paid conversion from a 10K list: <b>$36K\u2013$60K/year with near-zero acquisition cost.<\/b> Newsletter exit multiples run 3.5\u20136x revenue.\"<\/div>\n      <div class=\"context\">\n        <div class=\"context-label\">Score-by-score explanation \u2014 if Brett asks<\/div>\n        <p><b>Impact 4/5:<\/b> Addresses the deepest pain points simultaneously \u2014 trust erosion, retention gap, illusion of being informed, news avoidance. Not just another news product, a fundamentally different relationship with information. The prediction tracker creates accountability and identity (\"I'm someone who tracks what actually happens\").<br><br>\n        <b>Innovation 4/5:<\/b> Spaced repetition for news is novel. The Wednesday quiz is the specific innovation \u2014 no news product times content re-delivery to the forgetting curve. One point off because the newsletter format itself is not new, and the moat is in execution quality, not technical barriers.<br><br>\n        <b>Feasibility 4/5:<\/b> Most achievable of the three. MVP is literally: Beehiiv newsletter (Monday + Friday) + Google Form quiz (Wednesday). No engineering. Could launch in 7 days. The prediction tracker adds complexity but can be Phase 2. This is why it's the team recommendation \u2014 lowest risk to validate the core thesis.<br><br>\n        <b>Business 3/5:<\/b> Strong unit economics but structural ceiling. 18\u201320% of people pay for news \u2014 that's the market reality. At 10K subscribers with 10% conversion at $10/mo: $120K ARR. At 50K with 8%: $600K ARR. Exits at 3.5\u20136x revenue are realistic. Not venture-scale but an excellent creator business.<\/p>\n      <\/div>\n      <div class=\"tip\"><b>Key question for Brett:<\/b> \"Weekly cadence with quizzes as the core mechanic \u2014 does that feel right for your brand? And do you want to show your sources or keep it purely editorial?\"<\/div>\n    <\/div>\n  <\/div>\n\n  <div class=\"transition\">\u2192 <b>Transition:<\/b> \"So \u2014 let me put all three side by side and give you our honest read.\"<\/div>\n<\/div>\n\n\n<!-- WRAP -->\n<div class=\"section\">\n  <div class=\"section-title\"><div class=\"dot cg\"><\/div> Comparison Wrap + Open Floor<\/div>\n\n  <div id=\"note-wrap\" class=\"slide b-cw\">\n    <div class=\"slide-header\">\n      <span class=\"slide-name\">Summary \u2014 then stop talking<\/span>\n      <span class=\"slide-meta\">2 min summary + Brett leads from here<\/span>\n    <\/div>\n    <div class=\"slide-body\">\n      <div class=\"say\">\"<b>C1<\/b> \u2014 the safe bet. Feasibility 5/5, Innovation 2/5. You could start tomorrow. Solves production, not differentiation.<br><br><b>C2<\/b> \u2014 the moonshot. Innovation 5/5, highest score at 16/20. Most to build, highest upside, needs the most validation before committing.<br><br><b>C3<\/b> \u2014 our recommendation. Strongest research foundation, most novel approach to news, most achievable balance of innovation and feasibility. The Wednesday resurface is the idea.\"<\/div>\n      <div class=\"say\"><b>\"What resonates with you? Which problem feels most worth solving?\"<\/b><\/div>\n      <div class=\"context\">\n        <div class=\"context-label\">After this question \u2014 stop. Do not fill the silence.<\/div>\n        <p>You've given Brett everything he needs to react. The moment you ask \"what resonates?\" your job is to listen. Let him talk. Whatever he latches onto \u2014 that's the thread you pull on for the next conversation. If he combines C2 and C3, great. If he surprises you entirely, great. Don't pre-empt his answer by jumping ahead.<\/p>\n      <\/div>\n    <\/div>\n  <\/div>\n<\/div>\n\n\n<!-- Q&A -->\n<div class=\"section\">\n  <div id=\"note-qa\" class=\"section-title\"><div class=\"dot cw\"><\/div> Anticipated Questions<\/div>\n\n  <div class=\"qa-grid\">\n    <div class=\"qa\">\n      <div class=\"qa-q\">\"Why not just do a normal podcast?\"<\/div>\n      <div class=\"qa-a\">C1 addresses the production side of that \u2014 but even C1 doesn't answer why anyone would listen. The podcast market has 4M+ shows. Production ease is table stakes now. The differentiation question is the real problem to solve.<\/div>\n    <\/div>\n    <div class=\"qa\">\n      <div class=\"qa-q\">\"How do you know people will actually do daily quizzes?\"<\/div>\n      <div class=\"qa-a\">272 studies on retrieval practice + Duolingo 50M DAU + Wordle 5.3 billion plays. The mechanics are proven in multiple formats and at massive scale. The specific combo \u2014 daily + science + shareable \u2014 is new. That's what we'd validate in the first 10 days before building anything.<\/div>\n    <\/div>\n    <div class=\"qa\">\n      <div class=\"qa-q\">\"Isn't C3 just a newsletter?\"<\/div>\n      <div class=\"qa-a\">Without the Wednesday quiz resurface \u2014 yes, it's a well-written newsletter. With it, it's a learning system built on the Ebbinghaus forgetting curve. The Wednesday step is everything. Remove it and you've removed the differentiation entirely.<\/div>\n    <\/div>\n    <div class=\"qa\">\n      <div class=\"qa-q\">\"What if I want to combine C2 and C3?\"<\/div>\n      <div class=\"qa-a\">Great instinct \u2014 they share the same scientific foundation. Both run on retrieval practice and spaced repetition. A quiz-based news product is a valid and very defensible hybrid. We mapped it \u2014 it's clean and doesn't create contradictions.<\/div>\n    <\/div>\n    <div class=\"qa\">\n      <div class=\"qa-q\">\"What would you actually build first?\"<\/div>\n      <div class=\"qa-a\">Validate C2 or C3 with a 10-day WhatsApp prototype \u2014 zero engineering required. 50 people, daily messages, track day-1 completion, day-5 return rate, and share rate. You know if the core mechanic works in 10 days and $0 spent.<\/div>\n    <\/div>\n    <div class=\"qa\">\n      <div class=\"qa-q\">\"How long to build a real prototype?\"<\/div>\n      <div class=\"qa-a\">C1: days \u2014 all tools exist off the shelf. C2: 2 weeks \u2014 HTML quiz page + WhatsApp daily push. C3: 1 week \u2014 newsletter via Beehiiv + Google Form quizzes as the Wednesday resurface. All three are testable before any serious engineering spend.<\/div>\n    <\/div>\n  <\/div>\n<\/div>\n\n\n<!-- FOOTER -->\n<div class=\"footer\">\n  <div class=\"reminder\"><b>\ud83d\uddc2 Appendix = your safety net<\/b>Every data point is sourced in the HTML appendix. If Brett challenges any number, say \"it's in the appendix \u2014 I can pull it up right now.\" Don't defend from memory.<\/div>\n  <div class=\"reminder\"><b>\ud83d\udd07 Read limitations out loud<\/b>On every scorecard, read the honest limitation explicitly. Most people hide weaknesses. Reading them builds more trust than any pitch move. It shows you're analysing, not selling.<\/div>\n  <div class=\"reminder\"><b>\u23f1 Pacing check<\/b>Hit C3 by 14 min and you're on track. Running long? Cut the 4 Insights slides to 10 sec each \u2014 just name them and move on. Never rush the scorecard or the concept slides.<\/div>\n<\/div>\n\n<\/body>\n<\/html>\n";

function writeFrame(id, html) {
  var f = document.getElementById(id);
  var d = f.contentDocument || f.contentWindow.document;
  d.open('text/html','replace'); d.write(html); d.close();
}
writeFrame('deck', deckHTML);
writeFrame('notes', notesHTML);

var badge = document.getElementById('badge'), t;
window.addEventListener('message', function(e) {
  var d = e.data || {}, tid = null;
  if (d.type === 'slide-change') tid = slideMap[d.slideId];
  else if (d.type === 'view-change') { tid = slideMap[d.viewId]; if (!tid && d.viewId==='view-overview') tid='note-overview'; }
  if (!tid) return;
  try {
    var nf = document.getElementById('notes');
    var el = (nf.contentDocument||nf.contentWindow.document).getElementById(tid);
    if (el) { el.scrollIntoView({behavior:'smooth',block:'start'}); el.style.outline='2px solid rgba(79,220,138,0.6)'; el.style.borderRadius='10px'; setTimeout(function(){el.style.outline='';},1200); }
  } catch(err) {}
  badge.classList.add('on'); badge.textContent='\u27f3 '+(d.slideId||d.viewId||'');
  clearTimeout(t); t=setTimeout(function(){badge.classList.remove('on');badge.textContent='\u27f3 synced';},1500);
});

var dv=document.getElementById('div'),sp=document.getElementById('split'),pl=document.getElementById('pane-left'),dragging=false,sx=0,sw=0;
dv.addEventListener('mousedown',function(e){dragging=true;sx=e.clientX;sw=pl.getBoundingClientRect().width;dv.classList.add('drag');document.body.style.cursor='col-resize';document.body.style.userSelect='none';document.querySelectorAll('iframe').forEach(function(f){f.style.pointerEvents='none';});});
document.addEventListener('mousemove',function(e){if(!dragging)return;var tot=sp.getBoundingClientRect().width;var nw=Math.max(300,Math.min(sw+e.clientX-sx,tot-300));pl.style.flex='none';pl.style.width=nw+'px';});
document.addEventListener('mouseup',function(){if(!dragging)return;dragging=false;dv.classList.remove('drag');document.body.style.cursor='';document.body.style.userSelect='';document.querySelectorAll('iframe').forEach(function(f){f.style.pointerEvents='';});});

var slider = document.getElementById('font-slider');
var fontVal = document.getElementById('font-val');
function applyFontSize(size) {
  fontVal.textContent = size + 'px';
  try {
    var nf = document.getElementById('notes');
    var doc = nf.contentDocument || nf.contentWindow.document;
    var style = doc.getElementById('font-override-style');
    if (!style) {
      style = doc.createElement('style');
      style.id = 'font-override-style';
      doc.head.appendChild(style);
    }
    style.textContent = 'body { font-size: ' + size + 'px !important; } .say { font-size: ' + size + 'px !important; } .context p { font-size: ' + Math.round(size * 0.87) + 'px !important; } .insight-body { font-size: ' + Math.round(size * 0.8) + 'px !important; } .qa-a { font-size: ' + Math.round(size * 0.87) + 'px !important; } .tip { font-size: ' + Math.round(size * 0.8) + 'px !important; } .transition { font-size: ' + Math.round(size * 0.87) + 'px !important; }';
  } catch(err) { console.log(err); }
}
slider.addEventListener('input', function() { applyFontSize(parseInt(this.value)); });
// Apply after notes iframe loads
document.getElementById('notes').addEventListener('load', function() {
  applyFontSize(parseInt(slider.value));
});
