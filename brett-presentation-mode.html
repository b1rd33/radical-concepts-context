mdash; in under an hour, every morning, by himself.<\/p>\n                <div class=\"card-footer\"><span class=\"card-score\">Score: <strong>13/20<\/strong><\/span><span class=\"card-cta\">View Pitch &rarr;<\/span><\/div>\n            <\/div>\n            <div class=\"concept-card concept-card--c2\" onclick=\"showView('view-c2')\">\n                <div class=\"card-label\">Concept 2 of 3<\/div>\n                <h2 class=\"card-title\">The Curiosity Game<\/h2>\n                <p class=\"card-tagline\">A daily 3-minute game that turns science into social currency &mdash; making you the most interesting person at lunch.<\/p>\n                <div class=\"card-footer\"><span class=\"card-score\">Score: <strong>16/20<\/strong><\/span><span class=\"card-cta\">View Pitch &rarr;<\/span><\/div>\n            <\/div>\n            <div class=\"concept-card concept-card--c3\" onclick=\"showView('view-c3')\">\n                <div class=\"card-label\">Concept 3 of 3<\/div>\n                <h2 class=\"card-title\">The Dinner Table Drop<\/h2>\n                <p class=\"card-tagline\">A weekly news tracker built on learning science &mdash; helping you actually understand and remember what matters.<\/p>\n                <div class=\"card-footer\"><span class=\"card-score\">Score: <strong>15/20<\/strong><\/span><span class=\"card-cta\">View Pitch &rarr;<\/span><\/div>\n            <\/div>\n        <\/div>\n        <div class=\"scroll-hint\">Scroll for comparison &darr;<\/div>\n    <\/div>\n    <div class=\"overview-compare\">\n        <h2>How the three concepts stack up<\/h2>\n        <table class=\"compare-table\">\n            <thead><tr><th><\/th><th style=\"color:#4682B4;\">C1 Autopilot<\/th><th style=\"color:#FF6B6B;\">C2 Curiosity<\/th><th style=\"color:#C9A96E;\">C3 Dinner Table<\/th><\/tr><\/thead>\n            <tbody>\n                <tr><td class=\"dim-label\">Impact<\/td><td><div class=\"score-dots-sm\"><span class=\"sd-sm f1\"><\/span><span class=\"sd-sm f1\"><\/span><span class=\"sd-sm f1\"><\/span><span class=\"sd-sm\"><\/span><span class=\"sd-sm\"><\/span><\/div><\/td><td><div class=\"score-dots-sm\"><span class=\"sd-sm f2\"><\/span><span class=\"sd-sm f2\"><\/span><span class=\"sd-sm f2\"><\/span><span class=\"sd-sm f2\"><\/span><span class=\"sd-sm\"><\/span><\/div><\/td><td><div class=\"score-dots-sm\"><span class=\"sd-sm f3\"><\/span><span class=\"sd-sm f3\"><\/span><span class=\"sd-sm f3\"><\/span><span class=\"sd-sm f3\"><\/span><span class=\"sd-sm\"><\/span><\/div><\/td><\/tr>\n                <tr><td class=\"dim-label\">Innovation<\/td><td><div class=\"score-dots-sm\"><span class=\"sd-sm f1\"><\/span><span class=\"sd-sm f1\"><\/span><span class=\"sd-sm\"><\/span><span class=\"sd-sm\"><\/span><span class=\"sd-sm\"><\/span><\/div><\/td><td><div class=\"score-dots-sm\"><span class=\"sd-sm f2\"><\/span><span class=\"sd-sm f2\"><\/span><span class=\"sd-sm f2\"><\/span><span class=\"sd-sm f2\"><\/span><span class=\"sd-sm f2\"><\/span><\/div><\/td><td><div class=\"score-dots-sm\"><span class=\"sd-sm f3\"><\/span><span class=\"sd-sm f3\"><\/span><span class=\"sd-sm f3\"><\/span><span class=\"sd-sm f3\"><\/span><span class=\"sd-sm\"><\/span><\/div><\/td><\/tr>\n                <tr><td class=\"dim-label\">Feasibility<\/td><td><div class=\"score-dots-sm\"><span class=\"sd-sm f1\"><\/span><span class=\"sd-sm f1\"><\/span><span class=\"sd-sm f1\"><\/span><span class=\"sd-sm f1\"><\/span><span class=\"sd-sm f1\"><\/span><\/div><\/td><td><div class=\"score-dots-sm\"><span class=\"sd-sm f2\"><\/span><span class=\"sd-sm f2\"><\/span><span class=\"sd-sm f2\"><\/span><span class=\"sd-sm\"><\/span><span class=\"sd-sm\"><\/span><\/div><\/td><td><div class=\"score-dots-sm\"><span class=\"sd-sm f3\"><\/span><span class=\"sd-sm f3\"><\/span><span class=\"sd-sm f3\"><\/span><span class=\"sd-sm f3\"><\/span><span class=\"sd-sm\"><\/span><\/div><\/td><\/tr>\n                <tr><td class=\"dim-label\">Business<\/td><td><div class=\"score-dots-sm\"><span class=\"sd-sm f1\"><\/span><span class=\"sd-sm f1\"><\/span><span class=\"sd-sm f1\"><\/span><span class=\"sd-sm\"><\/span><span class=\"sd-sm\"><\/span><\/div><\/td><td><div class=\"score-dots-sm\"><span class=\"sd-sm f2\"><\/span><span class=\"sd-sm f2\"><\/span><span class=\"sd-sm f2\"><\/span><span class=\"sd-sm f2\"><\/span><span class=\"sd-sm\"><\/span><\/div><\/td><td><div class=\"score-dots-sm\"><span class=\"sd-sm f3\"><\/span><span class=\"sd-sm f3\"><\/span><span class=\"sd-sm f3\"><\/span><span class=\"sd-sm\"><\/span><span class=\"sd-sm\"><\/span><\/div><\/td><\/tr>\n                <tr><td class=\"dim-label\">Total<\/td><td style=\"font-weight:700;font-size:var(--text-lg);\">13/20<\/td><td style=\"font-weight:700;font-size:var(--text-lg);\">16/20<\/td><td style=\"font-weight:700;font-size:var(--text-lg);\">15/20<\/td><\/tr>\n                <tr><td class=\"dim-label\">Weakness<\/td><td style=\"opacity:0.6;\">Innovation 2/5<\/td><td style=\"opacity:0.6;\">Feasibility 3/5<\/td><td style=\"opacity:0.6;\">Business 3/5<\/td><\/tr>\n                <tr><td class=\"dim-label\">Riskiest Test<\/td><td style=\"opacity:0.6;\">Can AI scripts survive Brett's edit?<\/td><td style=\"opacity:0.6;\">Will people complete daily quizzes?<\/td><td style=\"opacity:0.6;\">Does Wed resurface improve retention?<\/td><\/tr>\n            <\/tbody>\n        <\/table>\n    <\/div>\n<\/div>\n<\/div>\n\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<!-- VIEW: C1 \u2014 BRETT ON AUTOPILOT               -->\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<div class=\"view\" id=\"view-c1\">\n<nav class=\"nav-dots\"><button class=\"nav-dot active\"><\/button><button class=\"nav-dot\"><\/button><button class=\"nav-dot\"><\/button><button class=\"nav-dot\"><\/button><button class=\"nav-dot\"><\/button><button class=\"nav-dot\"><\/button><\/nav>\n<div class=\"slides-container\">\n<section class=\"slide c1-title\" id=\"c1-title\">\n    <div class=\"header-bar\"><button class=\"back-to-menu\" onclick=\"showView('view-overview')\">&larr; Menu<\/button><div class=\"team-name\">Team Radical &middot; I2P 2026<\/div><div class=\"client-logo\"><div class=\"logo-mark\">RC<\/div> Radical Concepts<\/div><\/div>\n    <div class=\"slide-inner\">\n        <div class=\"concept-number\">Concept 1 of 3<\/div>\n        <h1 class=\"slide-title-h1\">Brett on Autopilot<\/h1>\n        <p class=\"tagline\">An AI-assisted production system that turns Brett's daily reading into a published podcast episode&nbsp;&mdash; in under an hour, every morning, by himself.<\/p>\n    <\/div>\n<\/section>\n\n<section class=\"slide c1-problem\" id=\"c1-problem\">\n    <div class=\"slide-inner\">\n        <div class=\"label\">The Problem<\/div>\n        <div class=\"big-stat\"><div class=\"number\">47%<\/div><div class=\"unit\">of all podcasts die before episode&nbsp;3 &mdash; solo creators can't sustain the production burden<\/div><\/div>\n        <div class=\"problem-details\">\n            <div class=\"problem-detail\"><div class=\"detail-number\">4&ndash;8 hrs<\/div><div class=\"detail-text\">Traditional podcast production time per episode<\/div><\/div>\n            <div class=\"problem-detail\"><div class=\"detail-number\">14+<\/div><div class=\"detail-text\">News sources Brett reads daily &mdash; editorial judgment exists, production time doesn't<\/div><\/div>\n            <div class=\"problem-detail\"><div class=\"detail-number\">~$150&ndash;200<\/div><div class=\"detail-text\">Monthly cost of a composable AI pipeline &mdash; economics now work for one person<\/div><\/div>\n        <\/div>\n        <a href=\"#appendix\" class=\"more-link\">Full problem analysis<\/a>\n    <\/div>\n<\/section>\n\n<section class=\"slide c1-insights\" id=\"c1-insights\">\n    <div class=\"slide-inner\">\n        <div class=\"label\">Research &amp; Insights<\/div>\n        <h2 class=\"insights-h2\">Quality control is the binding constraint. Not technology.<\/h2>\n        <div class=\"insight-grid\">\n            <div class=\"insight-card\"><div class=\"insight-num\">Insight 01<\/div><p>WaPo's AI podcast failed 68&ndash;84% of scripts &mdash; fabricated quotes, misattributions. <strong>AI-assisted, not fully automated.<\/strong><\/p><div class=\"insight-source\">Semafor Dec 2025; creator accounts<\/div><\/div>\n            <div class=\"insight-card\"><div class=\"insight-num\">Insight 02<\/div><p>Composable pipeline (n8n + GPT-4o + ElevenLabs) = <strong>~$150&ndash;200/month.<\/strong> Break-even at 150&ndash;200 downloads.<\/p><div class=\"insight-source\">Buzzsprout/IAB Podcast Ad Revenue Study 2024<\/div><\/div>\n            <div class=\"insight-card\"><div class=\"insight-num\">Insight 03<\/div><p><strong>47% of listeners<\/strong> would stop if AI voices used. Brett records his own voice; <strong>AI stays invisible.<\/strong><\/p><div class=\"insight-source\">Sounds Profitable 2025; Cumulus/Signal Hill 2025<\/div><\/div>\n            <div class=\"insight-card\"><div class=\"insight-num\">Insight 04<\/div><p><strong>70+ active AI copyright lawsuits.<\/strong> But Morning Brew, 1440, Axios all operate safely by rewriting in original voice.<\/p><div class=\"insight-source\">Advance Local v. Cohere; Bartz v. Anthropic<\/div><\/div>\n        <\/div>\n        <a href=\"#appendix\" class=\"more-link\">Full research &amp; sources<\/a>\n    <\/div>\n<\/section>\n\n<section class=\"slide c1-concept\" id=\"c1-concept\">\n    <div class=\"slide-inner\">\n        <div class=\"label\">The Concept<\/div>\n        <h2 class=\"concept-h2\">An AI pipeline that makes daily publishing sustainable<\/h2>\n        <p class=\"concept-desc\">Not a new format. Not a new audience. A production system that lets one person do what used to take a team.<\/p>\n        <div class=\"flow-horizontal\">\n            <div class=\"flow-item\"><div class=\"flow-icon\"><svg viewBox=\"0 0 24 24\"><path d=\"M4 11a9 9 0 0 1 9-9\"/><path d=\"M4 4a16 16 0 0 1 16 16\"/><circle cx=\"5\" cy=\"19\" r=\"1\"/><\/svg><\/div><h3>Morning Scan<\/h3><p>AI monitors 14+ sources overnight<\/p><\/div>\n            <div class=\"flow-item\"><div class=\"flow-icon\"><svg viewBox=\"0 0 24 24\"><path d=\"M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z\"/><path d=\"m9 12 2 2 4-4\"/><\/svg><\/div><h3>Editorial Gate<\/h3><p>Brett picks stories, adds notes (15&nbsp;min)<\/p><\/div>\n            <div class=\"flow-item\"><div class=\"flow-icon\"><svg viewBox=\"0 0 24 24\"><path d=\"M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z\"/><polyline points=\"14 2 14 8 20 8\"/><line x1=\"16\" y1=\"13\" x2=\"8\" y2=\"13\"/><line x1=\"16\" y1=\"17\" x2=\"8\" y2=\"17\"/><\/svg><\/div><h3>Script Draft<\/h3><p>AI generates, Brett reviews and edits<\/p><\/div>\n            <div class=\"flow-item\"><div class=\"flow-icon\"><svg viewBox=\"0 0 24 24\"><path d=\"M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z\"/><path d=\"M19 10v2a7 7 0 0 1-14 0v-2\"/><line x1=\"12\" y1=\"19\" x2=\"12\" y2=\"23\"/><line x1=\"8\" y1=\"23\" x2=\"16\" y2=\"23\"/><\/svg><\/div><h3>Recording<\/h3><p>Brett's voice (20&ndash;30&nbsp;min). AI post-production.<\/p><\/div>\n            <div class=\"flow-item\"><div class=\"flow-icon\"><svg viewBox=\"0 0 24 24\"><line x1=\"22\" y1=\"2\" x2=\"11\" y2=\"13\"/><polygon points=\"22 2 15 22 11 13 2 9 22 2\"/><\/svg><\/div><h3>Distribution<\/h3><p>One-click publish everywhere + show notes<\/p><\/div>\n        <\/div>\n        <div class=\"concept-callout\">AI is invisible infrastructure. Brett is the product.<\/div>\n    <\/div>\n<\/section>\n\n<section class=\"slide c1-impact\" id=\"c1-impact\">\n    <div class=\"slide-inner\">\n        <div class=\"label\">Why This Matters<\/div>\n        <div class=\"impact-headline\">~$150&ndash;200/month pipeline. Break-even at 150&ndash;200 downloads.<\/div>\n        <p class=\"impact-sub\">Daily cadence = 5.5&times; more ad inventory. No platform restrictions. 6&ndash;12 months to profitability.<\/p>\n        <div class=\"scorecard\">\n            <div class=\"score-card\"><div class=\"dimension\">Impact<\/div><div class=\"score-visual\"><div class=\"dot filled\"><\/div><div class=\"dot filled\"><\/div><div class=\"dot filled\"><\/div><div class=\"dot\"><\/div><div class=\"dot\"><\/div><\/div><div class=\"rationale\">Solves production bottleneck. Doesn't address why anyone would listen.<\/div><\/div>\n            <div class=\"score-card\"><div class=\"dimension\">Innovation<\/div><div class=\"score-visual\"><div class=\"dot filled\"><\/div><div class=\"dot filled\"><\/div><div class=\"dot\"><\/div><div class=\"dot\"><\/div><div class=\"dot\"><\/div><\/div><div class=\"rationale\">The obvious solution. Multiple platforms already exist. No defensible moat.<\/div><\/div>\n            <div class=\"score-card\"><div class=\"dimension\">Feasibility<\/div><div class=\"score-visual\"><div class=\"dot filled\"><\/div><div class=\"dot filled\"><\/div><div class=\"dot filled\"><\/div><div class=\"dot filled\"><\/div><div class=\"dot filled\"><\/div><\/div><div class=\"rationale\">All tools production-ready. Working prototype within days.<\/div><\/div>\n            <div class=\"score-card\"><div class=\"dimension\">Business Impact<\/div><div class=\"score-visual\"><div class=\"dot filled\"><\/div><div class=\"dot filled\"><\/div><div class=\"dot filled\"><\/div><div class=\"dot\"><\/div><div class=\"dot\"><\/div><\/div><div class=\"rationale\">Economics work but podcast monetization is slow.<\/div><\/div>\n        <\/div>\n        <div class=\"honest-limitation\"><strong>Honest limitation:<\/strong> Solves production but not differentiation. \"Why would anyone listen?\" is not answered by the pipeline.<\/div>\n    <\/div>\n<\/section>\n\n<section class=\"slide c1-next\" id=\"c1-next\">\n    <div class=\"slide-inner\">\n        <div class=\"label\">Next Steps<\/div>\n        <h2 class=\"next-h2\">What we need to move forward<\/h2>\n        <div class=\"next-grid\">\n            <div class=\"next-card\"><div class=\"next-type\">Riskiest Assumption<\/div><h3>Can AI scripts survive Brett's edit?<\/h3><p>WaPo: 68&ndash;84% failure. If Brett rewrites &gt;50%, time savings collapse.<\/p><\/div>\n            <div class=\"next-card\"><div class=\"next-type\">Validate<\/div><h3>10-day pipeline test<\/h3><p>Track: script edit rate (&lt;30%), Brett time (&lt;60&nbsp;min), errors (&lt;2), quality (&ge;3.5/5).<\/p><\/div>\n            <div class=\"next-card\"><div class=\"next-type\">Prototype<\/div><h3>Full pipeline: RSS &rarr; AI &rarr; Brett &rarr; publish<\/h3><p>If edit rate &gt;50%, pivot to AI-assisted research only.<\/p><\/div>\n            <div class=\"next-card\"><div class=\"next-type\">Client Decision<\/div><h3>AI-drafted or Brett-written scripts?<\/h3><p>Daily commitment? Which niche: general, vertical, or evening recap?<\/p><\/div>\n        <\/div>\n        <div class=\"concept-nav\">\n            <button class=\"concept-nav-link\" onclick=\"showView('view-overview')\">&larr; All Concepts<\/button>\n            <button class=\"concept-nav-link\" onclick=\"showView('view-c2')\">C2: The Curiosity Game &rarr;<\/button>\n            <button class=\"concept-nav-link\" onclick=\"showView('view-c3')\">C3: The Dinner Table Drop &rarr;<\/button>\n        <\/div>\n    <\/div>\n<\/section>\n<\/div>\n<\/div>\n\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<!-- VIEW: C2 \u2014 THE CURIOSITY GAME               -->\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<div class=\"view\" id=\"view-c2\">\n<nav class=\"nav-dots\"><button class=\"nav-dot active\"><\/button><button class=\"nav-dot\"><\/button><button class=\"nav-dot\"><\/button><button class=\"nav-dot\"><\/button><button class=\"nav-dot\"><\/button><button class=\"nav-dot\"><\/button><\/nav>\n<div class=\"slides-container\">\n<section class=\"slide c2-title\" id=\"c2-title\">\n    <div class=\"header-bar\"><button class=\"back-to-menu\" onclick=\"showView('view-overview')\">&larr; Menu<\/button><div class=\"team-name\">Team Radical &middot; I2P 2026<\/div><div class=\"client-logo\"><div class=\"logo-mark\">RC<\/div> Radical Concepts<\/div><\/div>\n    <div class=\"slide-inner\">\n        <div class=\"concept-number\">Concept 2 of 3<\/div>\n        <h1 class=\"slide-title-h1\">The Curiosity Game<\/h1>\n        <p class=\"tagline\">A daily 3-minute game that turns science and quirky stories into social currency&nbsp;&mdash; making you the most interesting person at lunch.<\/p>\n    <\/div>\n<\/section>\n\n<section class=\"slide c2-problem\" id=\"c2-problem\">\n    <div class=\"slide-inner\">\n        <div class=\"label\">The Problem<\/div>\n        <div class=\"big-stat\"><div class=\"number\">64%<\/div><div class=\"unit\">of Americans identify as doomscrollers &mdash; 2+ hrs/day on feeds negatively correlated with life satisfaction<\/div><\/div>\n        <div class=\"problem-details\">\n            <div class=\"problem-detail\"><div class=\"detail-number\">2+ hrs/day<\/div><div class=\"detail-text\">Time spent on social feeds that reduce life satisfaction<\/div><\/div>\n            <div class=\"problem-detail\"><div class=\"detail-number\">60%<\/div><div class=\"detail-text\">Open their phones intending to learn, not scroll mindlessly<\/div><\/div>\n            <div class=\"problem-detail\"><div class=\"detail-number\">0<\/div><div class=\"detail-text\">Products that make learning as easy and habit-forming as scrolling<\/div><\/div>\n        <\/div>\n        <a href=\"#appendix\" class=\"more-link\">Full problem analysis<\/a>\n    <\/div>\n<\/section>\n\n<section class=\"slide c2-insights\" id=\"c2-insights\">\n    <div class=\"slide-inner\">\n        <div class=\"label\">Research &amp; Insights<\/div>\n        <h2 class=\"insights-h2\">Quizzing beats passive reading. The mechanics are proven. Nobody combined them.<\/h2>\n        <div class=\"insight-grid\">\n            <div class=\"insight-card\"><div class=\"insight-num\">Insight 01<\/div><p>272 studies: testing effect (d&nbsp;=&nbsp;0.56) &mdash; quizzed readers retain <strong>25&ndash;50% more<\/strong> than passive readers.<\/p><div class=\"insight-source\">Adesope et al. 2017, 272 studies<\/div><\/div>\n            <div class=\"insight-card\"><div class=\"insight-num\">Insight 02<\/div><p>Duolingo grew DAU <strong>4.5&times; in 3 years<\/strong>. Streaks = 3&times; daily return. These mechanics are <strong>proven and replicable.<\/strong><\/p><div class=\"insight-source\">Duolingo Q4 2025 earnings<\/div><\/div>\n            <div class=\"insight-card\"><div class=\"insight-num\">Insight 03<\/div><p>15+ products scanned: <strong>nobody combines daily + science + quiz + shareable.<\/strong> Closest competitor archived Feb 2024.<\/p><div class=\"insight-source\">Competitive analysis, 15+ products scanned<\/div><\/div>\n            <div class=\"insight-card\"><div class=\"insight-num\">Insight 04<\/div><p>CrunchLabs converted YouTube to <strong>~$10M/month.<\/strong> At 0.05&ndash;0.10% conversion: <strong>5,000&ndash;20,000 installs, no paid acquisition.<\/strong><\/p><div class=\"insight-source\">Landrum 2021; CrunchLabs data<\/div><\/div>\n        <\/div>\n        <a href=\"#appendix\" class=\"more-link\">Full research &amp; sources<\/a>\n    <\/div>\n<\/section>\n\n<section class=\"slide c2-concept\" id=\"c2-concept\">\n    <div class=\"slide-inner\">\n        <div class=\"label\">The Concept<\/div>\n        <h2 class=\"concept-h2\">A daily curiosity quiz that makes you interesting<\/h2>\n        <p class=\"concept-desc\">Not a podcast. Not a newsletter. A 3-minute game you play, share, and actually remember.<\/p>\n        <div class=\"flow-horizontal\">\n            <div class=\"flow-item\"><div class=\"flow-icon\"><svg viewBox=\"0 0 24 24\"><path d=\"M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9\"/><path d=\"M13.73 21a2 2 0 0 1-3.46 0\"/><\/svg><\/div><h3>Morning Buzz<\/h3><p>Push: \"Today's curiosity drop is live\"<\/p><\/div>\n            <div class=\"flow-item\"><div class=\"flow-icon\"><svg viewBox=\"0 0 24 24\"><circle cx=\"12\" cy=\"12\" r=\"10\"/><polygon points=\"10 8 16 12 10 16 10 8\"/><\/svg><\/div><h3>Play 3 min<\/h3><p>Quirky setup, science question, prediction<\/p><\/div>\n            <div class=\"flow-item\"><div class=\"flow-icon\"><svg viewBox=\"0 0 24 24\"><line x1=\"9\" y1=\"18\" x2=\"15\" y2=\"18\"/><line x1=\"10\" y1=\"22\" x2=\"14\" y2=\"22\"/><path d=\"M15.09 14c.18-.98.65-1.74 1.41-2.5A4.65 4.65 0 0 0 18 8 6 6 0 0 0 6 8c0 1 .23 2.23 1.5 3.5A4.61 4.61 0 0 1 8.91 14\"/><\/svg><\/div><h3>See the Reveal<\/h3><p>Brett's commentary + real answer + context<\/p><\/div>\n            <div class=\"flow-item\"><div class=\"flow-icon\"><svg viewBox=\"0 0 24 24\"><path d=\"M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z\"/><\/svg><\/div><h3>Track Streak<\/h3><p>Score, streak counter, friend comparison<\/p><\/div>\n            <div class=\"flow-item\"><div class=\"flow-icon\"><svg viewBox=\"0 0 24 24\"><circle cx=\"18\" cy=\"5\" r=\"3\"/><circle cx=\"6\" cy=\"12\" r=\"3\"/><circle cx=\"18\" cy=\"19\" r=\"3\"/><line x1=\"8.59\" y1=\"13.51\" x2=\"15.42\" y2=\"17.49\"/><line x1=\"15.41\" y1=\"6.51\" x2=\"8.59\" y2=\"10.49\"/><\/svg><\/div><h3>Share at Lunch<\/h3><p>\"I got 4/5, beat me.\"<\/p><\/div>\n        <\/div>\n        <div class=\"concept-callout\">The white space is the moat &mdash; no product combines all four.<\/div>\n    <\/div>\n<\/section>\n\n<section class=\"slide c2-impact\" id=\"c2-impact\">\n    <div class=\"slide-inner\">\n        <div class=\"label\">Why This Matters<\/div>\n        <div class=\"impact-headline\">Dual revenue: B2C freemium + B2B licensing in a $2.6B market<\/div>\n        <p class=\"impact-sub\">Brett's existing audience is the distribution channel. Kahoot (9B+ participants, 70% Fortune 500) validates the quiz-to-B2B path.<\/p>\n        <div class=\"scorecard\">\n            <div class=\"score-card\"><div class=\"dimension\">Impact<\/div><div class=\"score-visual\"><div class=\"dot filled\"><\/div><div class=\"dot filled\"><\/div><div class=\"dot filled\"><\/div><div class=\"dot filled\"><\/div><div class=\"dot\"><\/div><\/div><div class=\"rationale\">New content category replacing doom scrolling with active recall.<\/div><\/div>\n            <div class=\"score-card\"><div class=\"dimension\">Innovation<\/div><div class=\"score-visual\"><div class=\"dot filled\"><\/div><div class=\"dot filled\"><\/div><div class=\"dot filled\"><\/div><div class=\"dot filled\"><\/div><div class=\"dot filled\"><\/div><\/div><div class=\"rationale\">Nobody occupies daily + science + quiz + shareable. Closest competitor is dead.<\/div><\/div>\n            <div class=\"score-card\"><div class=\"dimension\">Feasibility<\/div><div class=\"score-visual\"><div class=\"dot filled\"><\/div><div class=\"dot filled\"><\/div><div class=\"dot filled\"><\/div><div class=\"dot\"><\/div><div class=\"dot\"><\/div><\/div><div class=\"rationale\">Needs interactive front-end, game mechanics, content pipeline.<\/div><\/div>\n            <div class=\"score-card\"><div class=\"dimension\">Business Impact<\/div><div class=\"score-visual\"><div class=\"dot filled\"><\/div><div class=\"dot filled\"><\/div><div class=\"dot filled\"><\/div><div class=\"dot filled\"><\/div><div class=\"dot\"><\/div><\/div><div class=\"rationale\">Dual revenue in $2.6B growing 4&times; by 2032.<\/div><\/div>\n        <\/div>\n        <div class=\"honest-limitation\"><strong>Honest limitation:<\/strong> Feasibility at 3/5 is real. The white space is both opportunity and risk. Without daily retention, the model collapses.<\/div>\n    <\/div>\n<\/section>\n\n<section class=\"slide c2-next\" id=\"c2-next\">\n    <div class=\"slide-inner\">\n        <div class=\"label\">Next Steps<\/div>\n        <h2 class=\"next-h2\">What we need to move forward<\/h2>\n        <div class=\"next-grid\">\n            <div class=\"next-card\"><div class=\"next-type\">Riskiest Assumption<\/div><h3>Will people complete a daily quiz consistently?<\/h3><p>No direct comparable. Without daily habit, no business.<\/p><\/div>\n            <div class=\"next-card\"><div class=\"next-type\">Validate<\/div><h3>10 daily quizzes via WhatsApp<\/h3><p>Track: day-1 completion (&ge;60%), day-5 return (&ge;30%), share rate (&ge;1 per 5).<\/p><\/div>\n            <div class=\"next-card\"><div class=\"next-type\">Prototype<\/div><h3>HTML/Google Form daily quizzes<\/h3><p>If day-5 return &lt;15%, pivot format. If shares = 0, rethink result card.<\/p><\/div>\n            <div class=\"next-card\"><div class=\"next-type\">Client Decision<\/div><h3>Gamification fit for Brett's brand?<\/h3><p>B2B revenue model interesting, or pure consumer?<\/p><\/div>\n        <\/div>\n        <div class=\"concept-nav\">\n            <button class=\"concept-nav-link\" onclick=\"showView('view-overview')\">&larr; All Concepts<\/button>\n            <button class=\"concept-nav-link\" onclick=\"showView('view-c1')\">&larr; C1: Brett on Autopilot<\/button>\n            <button class=\"concept-nav-link\" onclick=\"showView('view-c3')\">C3: The Dinner Table Drop &rarr;<\/button>\n        <\/div>\n    <\/div>\n<\/section>\n<\/div>\n<\/div>\n\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<!-- VIEW: C3 \u2014 THE DINNER TABLE DROP             -->\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<div class=\"view\" id=\"view-c3\">\n<nav class=\"nav-dots\"><button class=\"nav-dot active\"><\/button><button class=\"nav-dot\"><\/button><button class=\"nav-dot\"><\/button><button class=\"nav-dot\"><\/button><button class=\"nav-dot\"><\/button><button class=\"nav-dot\"><\/button><\/nav>\n<div class=\"slides-container\">\n<section class=\"slide c3-title\" id=\"c3-title\">\n    <div class=\"header-bar\"><button class=\"back-to-menu\" onclick=\"showView('view-overview')\">&larr; Menu<\/button><div class=\"team-name\">Team Radical &middot; I2P 2026<\/div><div class=\"client-logo\"><div class=\"logo-mark\">RC<\/div> Radical Concepts<\/div><\/div>\n    <div class=\"slide-inner\">\n        <div class=\"concept-number\">Concept 3 of 3<\/div>\n        <h1 class=\"slide-title-h1\">The Dinner Table Drop<\/h1>\n        <p class=\"tagline\">A weekly news tracker that uses learning science and Brett's editorial lens to help you actually understand and remember what's happening in the world.<\/p>\n    <\/div>\n<\/section>\n\n<section class=\"slide c3-problem\" id=\"c3-problem\">\n    <div class=\"slide-inner\">\n        <div class=\"label\">The Problem<\/div>\n        <div class=\"big-stat\"><div class=\"number\">1 in 16<\/div><div class=\"unit\">headlines recalled after watching a full TV newscast &mdash; within a week, readers forget over half<\/div><\/div>\n        <div class=\"problem-details\">\n            <div class=\"problem-detail\"><div class=\"detail-number\">56%<\/div><div class=\"detail-text\">Of news content forgotten within one week of reading<\/div><\/div>\n            <div class=\"problem-detail\"><div class=\"detail-number\">75%<\/div><div class=\"detail-text\">Of Americans are overconfident about their news judgment<\/div><\/div>\n            <div class=\"problem-detail\"><div class=\"detail-number\">40%<\/div><div class=\"detail-text\">Of global audiences now avoid news &mdash; overwhelm, not apathy<\/div><\/div>\n        <\/div>\n        <a href=\"#appendix\" class=\"more-link\">Full problem analysis<\/a>\n    <\/div>\n<\/section>\n\n<section class=\"slide c3-insights\" id=\"c3-insights\">\n    <div class=\"slide-inner\">\n        <div class=\"label\">Research &amp; Insights<\/div>\n        <h2 class=\"insights-h2\">People forget most news. Retrieval practice fixes it. Nobody's tried.<\/h2>\n        <div class=\"insight-grid\">\n            <div class=\"insight-card\"><div class=\"insight-num\">Insight 01<\/div><p>Passive readers forget <strong>56% within a week.<\/strong> Tested readers forgot only 13% &mdash; a <strong>77% reduction.<\/strong><\/p><div class=\"insight-source\">Roediger &amp; Karpicke 2006; Meeter et al. 2005<\/div><\/div>\n            <div class=\"insight-card\"><div class=\"insight-num\">Insight 02<\/div><p>Social media creates an <strong>\"illusion of being informed\"<\/strong> &mdash; 75% overconfident about news judgment.<\/p><div class=\"insight-source\">Pennycook &amp; Rand 2021 (PNAS)<\/div><\/div>\n            <div class=\"insight-card\"><div class=\"insight-num\">Insight 03<\/div><p><strong>40% avoid news<\/strong> &mdash; up from 29% in 2017. Tortoise Media's \"slow journalism\" attracted <strong>110K+ paying members.<\/strong><\/p><div class=\"insight-source\">Reuters 2025 (97,055 adults, 48 markets)<\/div><\/div>\n            <div class=\"insight-card\"><div class=\"insight-num\">Insight 04<\/div><p>50+ products scanned: <strong>zero combine<\/strong> spaced repetition + quizzes + editorial curation + source transparency.<\/p><div class=\"insight-source\">Competitive analysis, 50+ products scanned<\/div><\/div>\n        <\/div>\n        <a href=\"#appendix\" class=\"more-link\">Full research &amp; sources<\/a>\n    <\/div>\n<\/section>\n\n<section class=\"slide c3-concept\" id=\"c3-concept\">\n    <div class=\"slide-inner\">\n        <div class=\"label\">The Concept<\/div>\n        <h2 class=\"concept-h2\">A weekly news experience built on learning science<\/h2>\n        <p class=\"concept-desc\">Not another newsletter. A system that tracks stories across a full week and makes sure you remember what matters.<\/p>\n        <div class=\"flow-horizontal\">\n            <div class=\"flow-item\"><div class=\"flow-icon\"><svg viewBox=\"0 0 24 24\"><polyline points=\"22 12 16 12 14 15 10 9 8 12 2 12\"/><\/svg><\/div><h3>Monday Drop<\/h3><p>3 curated stories with Brett's take<\/p><\/div>\n            <div class=\"flow-item\"><div class=\"flow-icon\"><svg viewBox=\"0 0 24 24\"><polyline points=\"23 4 23 10 17 10\"/><path d=\"M20.49 15a9 9 0 1 1-2.12-9.36L23 10\"/><\/svg><\/div><h3>Wednesday Resurface<\/h3><p>Stories return + quiz on key facts<\/p><\/div>\n            <div class=\"flow-item\"><div class=\"flow-icon\"><svg viewBox=\"0 0 24 24\"><polygon points=\"12 2 2 7 12 12 22 7 12 2\"/><polyline points=\"2 17 12 22 22 17\"/><polyline points=\"2 12 12 17 22 12\"/><\/svg><\/div><h3>Friday Synthesis<\/h3><p>\"Here's what actually mattered.\"<\/p><\/div>\n            <div class=\"flow-item\"><div class=\"flow-icon\"><svg viewBox=\"0 0 24 24\"><circle cx=\"11\" cy=\"11\" r=\"8\"/><line x1=\"21\" y1=\"21\" x2=\"16.65\" y2=\"16.65\"/><\/svg><\/div><h3>Deep Dive<\/h3><p>Full source map, counterarguments<\/p><\/div>\n            <div class=\"flow-item\"><div class=\"flow-icon\"><svg viewBox=\"0 0 24 24\"><circle cx=\"12\" cy=\"12\" r=\"10\"/><circle cx=\"12\" cy=\"12\" r=\"6\"/><circle cx=\"12\" cy=\"12\" r=\"2\"/><\/svg><\/div><h3>Prediction<\/h3><p>Stake your call, track accuracy<\/p><\/div>\n        <\/div>\n        <div class=\"concept-callout\">\"Everyone else reacts in 5 minutes. We react in 5 days.\"<\/div>\n    <\/div>\n<\/section>\n\n<section class=\"slide c3-impact\" id=\"c3-impact\">\n    <div class=\"slide-inner\">\n        <div class=\"label\">Why This Matters<\/div>\n        <div class=\"impact-headline\">6&ndash;12% free-to-paid conversion. $36K&ndash;$60K/year from a 10K list.<\/div>\n        <p class=\"impact-sub\">Brett's audience maps onto the 18&ndash;20% who pay for news. Near-zero CAC. Exit multiples: 3.5&ndash;6&times; revenue.<\/p>\n        <div class=\"scorecard\">\n            <div class=\"score-card\"><div class=\"dimension\">Impact<\/div><div class=\"score-visual\"><div class=\"dot filled\"><\/div><div class=\"dot filled\"><\/div><div class=\"dot filled\"><\/div><div class=\"dot filled\"><\/div><div class=\"dot\"><\/div><\/div><div class=\"rationale\">Addresses deepest pain: trust erosion, retention gap, illusion of being informed.<\/div><\/div>\n            <div class=\"score-card\"><div class=\"dimension\">Innovation<\/div><div class=\"score-visual\"><div class=\"dot filled\"><\/div><div class=\"dot filled\"><\/div><div class=\"dot filled\"><\/div><div class=\"dot filled\"><\/div><div class=\"dot\"><\/div><\/div><div class=\"rationale\">Spaced repetition for news genuinely novel. 50+ scan found zero combining all four.<\/div><\/div>\n            <div class=\"score-card\"><div class=\"dimension\">Feasibility<\/div><div class=\"score-visual\"><div class=\"dot filled\"><\/div><div class=\"dot filled\"><\/div><div class=\"dot filled\"><\/div><div class=\"dot filled\"><\/div><div class=\"dot\"><\/div><\/div><div class=\"rationale\">Most achievable. Core is curated content + scheduled delivery.<\/div><\/div>\n            <div class=\"score-card\"><div class=\"dimension\">Business Impact<\/div><div class=\"score-visual\"><div class=\"dot filled\"><\/div><div class=\"dot filled\"><\/div><div class=\"dot filled\"><\/div><div class=\"dot\"><\/div><div class=\"dot\"><\/div><\/div><div class=\"rationale\">Strong unit economics but structurally hard &mdash; only 18&ndash;20% pay for news.<\/div><\/div>\n        <\/div>\n        <div class=\"honest-limitation\"><strong>Honest limitation:<\/strong> Business Impact at 3/5 is real. Strongest scientific foundation but hardest monetization path. Sustainable creator business, not venture-scale.<\/div>\n    <\/div>\n<\/section>\n\n<section class=\"slide c3-next\" id=\"c3-next\">\n    <div class=\"slide-inner\">\n        <div class=\"label\">Next Steps<\/div>\n        <h2 class=\"next-h2\">What we need to move forward<\/h2>\n        <div class=\"next-grid\">\n            <div class=\"next-card\"><div class=\"next-type\">Riskiest Assumption<\/div><h3>Will Wednesday resurface improve retention?<\/h3><p>Without spaced repetition layer, this is just another newsletter.<\/p><\/div>\n            <div class=\"next-card\"><div class=\"next-type\">Validate<\/div><h3>A/B test with ~50 people<\/h3><p>Group A: Mon+Fri only. Group B: Mon+Wed quiz+Fri. Target: B recalls &ge;50% more.<\/p><\/div>\n            <div class=\"next-card\"><div class=\"next-type\">Prototype<\/div><h3>WhatsApp + Google Form + voice note<\/h3><p>If Group B &lt;20% improvement, pivot to pure editorial newsletter.<\/p><\/div>\n            <div class=\"next-card\"><div class=\"next-type\">Client Decision<\/div><h3>Weekly cadence + quiz as core mechanic?<\/h3><p>\"Show Your Work\" transparency model? Freemium or pure paid?<\/p><\/div>\n        <\/div>\n        <div class=\"concept-nav\">\n            <button class=\"concept-nav-link\" onclick=\"showView('view-overview')\">&larr; All Concepts<\/button>\n            <button class=\"concept-nav-link\" onclick=\"showView('view-c1')\">&larr; C1: Brett on Autopilot<\/button>\n            <button class=\"concept-nav-link\" onclick=\"showView('view-c2')\">&larr; C2: The Curiosity Game<\/button>\n        <\/div>\n    <\/div>\n<\/section>\n<\/div>\n<\/div>\n\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<!-- VIEW: APPENDIX                              -->\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<div class=\"view\" id=\"view-appendix\">\n<div class=\"appendix\" id=\"appendix\">\n    <div class=\"appendix-inner\">\n        <div class=\"label\">Appendix<\/div>\n        <h2>References &amp; Sources &mdash; All Concepts<\/h2>\n\n        <div class=\"appendix-concept-label\" id=\"appendix-c1\" style=\"color:#4682B4; border-bottom: 2px solid #4682B4;\">Concept 1 &mdash; Brett on Autopilot<\/div>\n\n        <div class=\"appendix-section\">\n            <h3>1. Production Pipeline &amp; Cost Architecture<\/h3>\n            <p>The recommended stack is <strong>n8n (self-hosted) + GPT-4o-mini + GPT-4o + ElevenLabs + Buzzsprout<\/strong>, costing ~$55&ndash;85/month at mid-range or ~$150&ndash;220/month at premium. The pipeline has six layers: RSS ingestion (monitoring 14+ sources), AI summarization, script generation, TTS voice synthesis, audio post-processing, and automated distribution. TTS dominates the budget &mdash; LLM costs are under $5/month even with premium models.<\/p>\n            <p>Realistic human oversight is <strong>30&ndash;60 minutes/day<\/strong> for script review and audio QA. Zero-oversight pipelines show 68&ndash;84% failure rates (see Washington Post below).<\/p>\n            <ul>\n                <li><span class=\"tag\">Benchmark<\/span> Traditional production: 4&ndash;8 hours. AI-assisted hybrid: 1&ndash;3 hours. Fully automated: 5&ndash;15 minutes.<\/li>\n                <li><span class=\"tag\">Benchmark<\/span> Total cost: $50&ndash;200/month vs traditional $500&ndash;2,000+ per episode.<\/li>\n                <li><span class=\"tag\">Source<\/span> <a href=\"https://n8n.io\" target=\"_blank\">n8n documentation<\/a> &middot; <a href=\"https://elevenlabs.io/pricing\" target=\"_blank\">ElevenLabs pricing<\/a> &middot; <a href=\"https://www.buzzsprout.com/pricing\" target=\"_blank\">Buzzsprout pricing<\/a><\/li>\n            <\/ul>\n        <\/div>\n\n        <div class=\"appendix-section\">\n            <h3>2. Voice Technology &amp; Listener Perception<\/h3>\n            <p>Voice cloning can pass detection tests, but <strong>audience acceptance is a separate and unresolved problem.<\/strong> A 2025 PLoS One study found voice clones fooled 58% of listeners &mdash; but Sounds Profitable&rsquo;s 2025 report found <strong>47% of podcast consumers would be less likely to keep listening<\/strong> to a show using AI voices.<\/p>\n            <ul>\n                <li><span class=\"tag\">Data<\/span> 56% of listeners say podcast hosts are the influencer type that &ldquo;matters most&rdquo; &mdash; 3&times; the share for social media influencers (Cumulus/Signal Hill 2025)<\/li>\n                <li><span class=\"tag\">Data<\/span> AI voices reduce cognitive engagement at the neural level vs. human voices (PMC EEG study, 2023)<\/li>\n                <li><span class=\"tag\">Source<\/span> <a href=\"https://doi.org/10.1371/journal.pone.0332692\" target=\"_blank\">Lavan et al. PLoS One 2025<\/a> &middot; <a href=\"https://soundsprofitable.com/article/how-do-humans-feel-about-ai-voices-in-podcasting/\" target=\"_blank\">Sounds Profitable 2025<\/a> &middot; <a href=\"https://pmc.ncbi.nlm.nih.gov/articles/PMC10701901/\" target=\"_blank\">PMC EEG study<\/a><\/li>\n            <\/ul>\n        <\/div>\n\n        <div class=\"appendix-section\">\n            <h3>3. Failure Cases &amp; Quality Benchmarks<\/h3>\n            <p><strong>Washington Post AI Podcast (Dec 2025):<\/strong> 68&ndash;84% of scripts failed editorial standards. Fabricated quotes, misattributed statements. The most important cautionary case for C1.<\/p>\n            <p><strong>What worked:<\/strong> Solo creators who maintained human oversight succeeded. The Newsworthy reached 800K downloads/month by year 5 with a staff of one.<\/p>\n            <ul>\n                <li><span class=\"tag\">Source<\/span> <a href=\"https://www.semafor.com/article/12/11/2025/washington-posts-ai-generated-podcasts-rife-with-errors-fictional-quotes\" target=\"_blank\">Semafor investigation<\/a> &middot; <a href=\"https://americanpressinstitute.org/when-ai-news-products-dont-meet-editorial-standards/\" target=\"_blank\">American Press Institute<\/a><\/li>\n            <\/ul>\n        <\/div>\n\n        <div class=\"appendix-section\">\n            <h3>4. Content Licensing &amp; Legal Risk<\/h3>\n            <p><strong>70+ active AI copyright lawsuits<\/strong> as of late 2025. Key cases: <em>Advance Local v. Cohere<\/em> (AI summaries may infringe even if non-verbatim), <em>Bartz v. Anthropic<\/em> ($1.5B settlement), <em>NYT v. OpenAI<\/em> (ongoing).<\/p>\n            <p><strong>Safe models:<\/strong> Morning Brew ($75M exit), 1440 (4M+ subs), Axios ($525M exit) all use human editorial rewriting &mdash; extract facts, rewrite in original voice, link to sources.<\/p>\n            <ul>\n                <li><span class=\"tag\">Source<\/span> Advance Local v. Cohere (S.D.N.Y., Nov 2025) &middot; Bartz v. Anthropic ($1.5B settlement) &middot; NYT v. OpenAI (Dec 2023) &middot; Tennessee ELVIS Act (2024) &middot; EU AI Act<\/li>\n            <\/ul>\n        <\/div>\n\n        <div class=\"appendix-section\">\n            <h3>5. Competitive Landscape &amp; Market Data<\/h3>\n            <p><strong>Market:<\/strong> Global podcast market $31.49B (2025). AI in podcasting $4.06B with 32.2% CAGR. The Daily costs ~$23&ndash;29K/episode with 50+ staff; C1 produces comparable format at &lt;$10/episode.<\/p>\n            <p><strong>Gap:<\/strong> Most daily news podcasts require large teams OR sacrifice quality. The combination of <strong>AI-assisted production + human editorial voice + daily cadence<\/strong> is underserved.<\/p>\n            <ul>\n                <li><span class=\"tag\">Source<\/span> Grand View Research &middot; NYRB May 2025 &middot; <a href=\"https://support.spotify.com/us/creators/article/spotify-for-creators-community-guidelines/\" target=\"_blank\">Spotify guidelines<\/a> &middot; <a href=\"https://podcasters.apple.com/support/891-content-and-subscription-guidelines\" target=\"_blank\">Apple guidelines<\/a><\/li>\n            <\/ul>\n        <\/div>\n\n        <div class=\"appendix-section\">\n            <h3>6. Monetization &amp; Break-Even Economics<\/h3>\n            <p>At $25 CPM mid-roll with 2 ads/episode, break-even is ~150&ndash;200 downloads/episode. Daily cadence gives <strong>5.5&times; more ad inventory<\/strong> than weekly shows. Reality: median podcast gets &lt;50 downloads/episode; $1,000/month requires top-5% performance.<\/p>\n            <ul>\n                <li><span class=\"tag\">Source<\/span> IAB CPM benchmarks &middot; Buzzsprout industry data &middot; The Newsworthy public data<\/li>\n            <\/ul>\n        <\/div>\n\n        <div class=\"appendix-section\">\n            <h3>7. Client Context<\/h3>\n            <ul>\n                <li><span class=\"tag\">Interview<\/span> Meeting #1 with Brett &mdash; 14+ daily news sources, editorial preferences, interest in automation<\/li>\n                <li><span class=\"tag\">Interview<\/span> Meeting #5 with Farid &mdash; 4-dimension scorecard requirement, presentations under 3 minutes, MLP framing<\/li>\n            <\/ul>\n        <\/div>\n\n        <div class=\"appendix-concept-label\" id=\"appendix-c2\" style=\"color:#FF6B6B; border-bottom: 2px solid #FF6B6B;\">Concept 2 &mdash; The Curiosity Game<\/div>\n\n        <div class=\"appendix-section\">\n            <h3>1. Retention Science &amp; the Testing Effect<\/h3>\n            <p><strong>Quizzing people on material makes them remember 25&ndash;50% more<\/strong> than passive reading. Adesope et al. 2017 (272 studies): testing effect d = 0.56. Roediger &amp; Karpicke 2006: passive readers forgot 56% after one week while tested readers forgot only 13%.<\/p>\n            <ul>\n                <li><span class=\"tag\">Source<\/span> <a href=\"https://doi.org/10.3102/0034654316689306\" target=\"_blank\">Adesope et al. 2017<\/a> &middot; Karpicke &amp; Blunt 2011 (<em>Science<\/em>) &middot; Roediger &amp; Karpicke 2006<\/li>\n            <\/ul>\n        <\/div>\n\n        <div class=\"appendix-section\">\n            <h3>2. Gamification Mechanics &mdash; Duolingo as the Model<\/h3>\n            <p>Duolingo&rsquo;s DAU grew <strong>4.5&times; in three years<\/strong> (13M &rarr; 50M+). Revenue exceeded $1B+ annually by end 2025.<\/p>\n            <ul>\n                <li><span class=\"tag\">Data<\/span> <strong>Streaks<\/strong> &mdash; 3&times; more likely to return daily, 60% commitment increase<\/li>\n                <li><span class=\"tag\">Data<\/span> <strong>Leaderboards<\/strong> &mdash; 40% engagement lift from social competition<\/li>\n                <li><span class=\"tag\">Data<\/span> <strong>DAU/MAU ratio<\/strong> &mdash; 37%, exceptional for any consumer app<\/li>\n                <li><span class=\"tag\">Source<\/span> Duolingo Q4 2025 earnings &middot; Yu-kai Chou Octalysis &middot; BJ Fogg B=MAP &middot; Nir Eyal Hook Model<\/li>\n            <\/ul>\n        <\/div>\n\n        <div class=\"appendix-section\">\n            <h3>3. Doom Scrolling &amp; the Passive Consumption Problem<\/h3>\n            <p><strong>64% of Americans identify as doomscrollers<\/strong> (Payless Power 2025). Over 60% of app sessions diverge from the user&rsquo;s original intention (CMU study, 34K screenshots). The gap isn&rsquo;t access to information &mdash; it&rsquo;s that <strong>no product makes learning as easy and habit-forming as scrolling.<\/strong><\/p>\n            <ul>\n                <li><span class=\"tag\">Source<\/span> <a href=\"https://pmc.ncbi.nlm.nih.gov/articles/PMC9580444/\" target=\"_blank\">Satici et al. 2023<\/a> &middot; <a href=\"https://paylesspower.com/blog/the-real-cost-of-doomscrolling/\" target=\"_blank\">Payless Power 2025<\/a> &middot; <a href=\"https://theharrispoll.com/briefs/gen-z-social-media-smart-phones/\" target=\"_blank\">Harris Poll 2024<\/a><\/li>\n            <\/ul>\n        <\/div>\n\n        <div class=\"appendix-section\">\n            <h3>4. Social Currency &amp; Viral Sharing<\/h3>\n            <p><strong>Berger &amp; Milkman 2012:<\/strong> awe-inspiring science content is the #1 most-shared category online. <strong>Loewenstein 1994:<\/strong> curiosity = gap between what you know and want to know. A quiz format exploits this gap perfectly.<\/p>\n            <ul>\n                <li><span class=\"tag\">Benchmark<\/span> Wordle &mdash; 5.3B plays in 2024, 99% next-day return<\/li>\n                <li><span class=\"tag\">Benchmark<\/span> Spotify Wrapped &mdash; 500M shares annually<\/li>\n                <li><span class=\"tag\">Benchmark<\/span> NYT Games &mdash; 11.1B plays, daily habit + share culture<\/li>\n                <li><span class=\"tag\">Source<\/span> <a href=\"https://doi.org/10.1509/jmr.10.0353\" target=\"_blank\">Berger &amp; Milkman 2012<\/a> &middot; Loewenstein 1994 &middot; Wohn &amp; Ahmadi 2019<\/li>\n            <\/ul>\n        <\/div>\n\n        <div class=\"appendix-section\">\n            <h3>5. Competitive Landscape &amp; the White Space<\/h3>\n            <p><strong>No product combines daily + science + quiz + shareable.<\/strong> 15+ products scanned across daily games, science education, gamified learning, and shareable content.<\/p>\n            <ul>\n                <li><span class=\"tag\">Competitor<\/span> Kurzgesagt (24.8M subs) &mdash; Science content, but video not interactive<\/li>\n                <li><span class=\"tag\">Competitor<\/span> Wordle (NYT) &mdash; Daily shareable, but word puzzles not knowledge<\/li>\n                <li><span class=\"tag\">Competitor<\/span> Duolingo (50M+ DAU) &mdash; Gamified daily learning, but languages not curiosity<\/li>\n                <li><span class=\"tag\">Competitor<\/span> <a href=\"https://brilliant.org\" target=\"_blank\">Brilliant.org<\/a> ($100M+ raised) &mdash; Closest in content, but not daily, no share mechanic<\/li>\n                <li><span class=\"tag\">Competitor<\/span> Columbia &ldquo;Science Scramble&rdquo; &mdash; Closest direct competitor, archived Feb 2024<\/li>\n                <li><span class=\"tag\">Case<\/span> Kahoot (9B+ participants) &mdash; Simple format, pivoted to B2B. 70% of Fortune 500. Validates quiz-to-B2B path.<\/li>\n            <\/ul>\n        <\/div>\n\n        <div class=\"appendix-section\">\n            <h3>6. B2B Corporate Learning Market<\/h3>\n            <p>Corporate e-learning: $104&ndash;125B market. Microlearning segment: $2.6B &rarr; $10.4B by 2032. No one has &ldquo;daily gamified curiosity content&rdquo; as a B2B employee engagement tool.<\/p>\n            <ul>\n                <li><span class=\"tag\">Data<\/span> Employees get only <strong>24 minutes/week<\/strong> for learning &mdash; 1% of work time (Bersin/Deloitte)<\/li>\n                <li><span class=\"tag\">Data<\/span> Microlearning: 25&ndash;60% higher retention, 130% productivity lift vs. traditional<\/li>\n                <li><span class=\"tag\">Data<\/span> C2 recommended pricing: $3&ndash;7/user/month ($36&ndash;84/year)<\/li>\n                <li><span class=\"tag\">Source<\/span> Grand View Research &middot; Training Industry Report 2025 &middot; Bersin by Deloitte<\/li>\n            <\/ul>\n        <\/div>\n\n        <div class=\"appendix-section\">\n            <h3>7. Science YouTube Audience &amp; Creator-Product Fit<\/h3>\n            <p>Science YouTube viewers are <strong>65&ndash;93% male<\/strong>, concentrated in 25&ndash;36 age band, disproportionately college-educated (Landrum 2021). 73% of adults self-identify as &ldquo;lifelong learners&rdquo; (Pew).<\/p>\n            <ul>\n                <li><span class=\"tag\">Case<\/span> CrunchLabs (Mark Rober) &mdash; YouTube to ~$10M/month in subscriptions<\/li>\n                <li><span class=\"tag\">Case<\/span> <a href=\"https://brilliant.org\" target=\"_blank\">Brilliant.org<\/a> &mdash; Sponsored 208+ science channels, validates paying segment<\/li>\n                <li><span class=\"tag\">Data<\/span> At 0.05&ndash;0.10% conversion, launch yields 5,000&ndash;20,000 installs. LTV:CAC 12:1+<\/li>\n                <li><span class=\"tag\">Source<\/span> <a href=\"https://pmc.ncbi.nlm.nih.gov/articles/PMC8668831/\" target=\"_blank\">Landrum 2021<\/a> &middot; Pew Research &middot; CrunchLabs/Brilliant.org public data<\/li>\n            <\/ul>\n        <\/div>\n\n        <div class=\"appendix-section\">\n            <h3>8. Client Context<\/h3>\n            <ul>\n                <li><span class=\"tag\">Interview<\/span> Meeting #1 with Brett &mdash; Content taste, quirky stories, WhatsApp curation habits<\/li>\n                <li><span class=\"tag\">Interview<\/span> Meeting #5 with Farid &mdash; 4-dimension scorecard requirement, presentations under 3 minutes, MLP framing<\/li>\n            <\/ul>\n        <\/div>\n\n        <div class=\"appendix-concept-label\" id=\"appendix-c3\" style=\"color:#C9A96E; border-bottom: 2px solid #C9A96E;\">Concept 3 &mdash; The Dinner Table Drop<\/div>\n\n        <div class=\"appendix-section\">\n            <h3>1. Spaced Repetition &amp; Memory Science<\/h3>\n            <p>Roediger &amp; Karpicke 2006: passive readers forgot <strong>56%<\/strong> while tested readers forgot only <strong>13%<\/strong> &mdash; a <strong>77% reduction in forgetting<\/strong>. Meeter et al. 2005 (14,000 participants, 500K data points) proved news follows the same forgetting dynamics. Higher consumption does NOT slow forgetting.<\/p>\n            <ul>\n                <li><span class=\"tag\">Data<\/span> Cepeda et al. (2008): optimal gap for 1-month retention is <strong>~1 week<\/strong> &mdash; supports DTD&rsquo;s weekly cadence<\/li>\n                <li><span class=\"tag\">Data<\/span> Adesope et al. (2017): testing effect d = 0.56, 25&ndash;50% retention improvement<\/li>\n                <li><span class=\"tag\">Source<\/span> Roediger &amp; Karpicke 2006 &middot; <a href=\"https://doi.org/10.3758/BF03193232\" target=\"_blank\">Meeter et al. 2005<\/a> &middot; <a href=\"https://doi.org/10.3102/0034654316689306\" target=\"_blank\">Adesope et al. 2017<\/a> &middot; Murre &amp; Dros 2015<\/li>\n            <\/ul>\n        <\/div>\n\n        <div class=\"appendix-section\">\n            <h3>2. Trust in Media &amp; News Consumption<\/h3>\n            <p>Trust has collapsed, avoidance is rising, analysis infrastructure is disappearing &mdash; but demand for depth is growing.<\/p>\n            <ul>\n                <li><span class=\"tag\">Data<\/span> <strong>28%<\/strong> of Americans trust mass media &mdash; Gallup 2025, all-time low since 1972<\/li>\n                <li><span class=\"tag\">Data<\/span> <strong>40%<\/strong> of global audiences actively avoid news &mdash; Reuters 2025, up from 29% in 2017<\/li>\n                <li><span class=\"tag\">Data<\/span> 3,500 US newspapers closed since 2005; 213 counties are now news deserts<\/li>\n                <li><span class=\"tag\">Source<\/span> <a href=\"https://news.gallup.com\" target=\"_blank\">Gallup 2025<\/a> &middot; <a href=\"https://reutersinstitute.politics.ox.ac.uk/digital-news-report\" target=\"_blank\">Reuters DNR 2025<\/a> &middot; Edelman Trust Barometer 2025/2026<\/li>\n            <\/ul>\n        <\/div>\n\n        <div class=\"appendix-section\">\n            <h3>3. News Retention &amp; the &ldquo;Illusion of Being Informed&rdquo;<\/h3>\n            <p>After watching a full newscast, the average viewer recalls just <strong>6% of headlines unaided<\/strong> (1 in 16). 75% are overconfident about their news judgment (Pennycook &amp; Rand 2021). 75% of news articles shared on social media are shared without clicking the link.<\/p>\n            <ul>\n                <li><span class=\"tag\">Source<\/span> <a href=\"https://baeuml.app.uni-regensburg.de/paper/papers_open/AB21_Cognition.pdf\" target=\"_blank\">B&auml;uml 2021<\/a> &middot; <a href=\"https://www.pnas.org/doi/10.1073/pnas.2019527118\" target=\"_blank\">Pennycook &amp; Rand 2021<\/a> &middot; <a href=\"https://www.psu.edu/news/research/story/social-media-users-probably-wont-read-beyond-headline-researchers-say\" target=\"_blank\">Penn State 2020<\/a><\/li>\n            <\/ul>\n        <\/div>\n\n        <div class=\"appendix-section\">\n            <h3>4. News Avoidance Psychology<\/h3>\n            <p>40% of global audiences avoid news (Reuters 2025). Reasons: mood impact 39%, worn out 31%, too much conflict 30%. Research shows selective avoiders are <strong>actively open to formats that are explanatory, curated, and solutions-oriented<\/strong>.<\/p>\n            <ul>\n                <li><span class=\"tag\">Data<\/span> The Trust Project: ~300 news orgs, trust jumped <strong>8% after implementing<\/strong> transparency indicators<\/li>\n                <li><span class=\"tag\">Case<\/span> Tortoise Media &mdash; &ldquo;ThinkIn&rdquo; events where public participates in editorial decisions<\/li>\n                <li><span class=\"tag\">Source<\/span> <a href=\"https://reutersinstitute.politics.ox.ac.uk/digital-news-report\" target=\"_blank\">Reuters DNR 2023&ndash;2025<\/a> &middot; Toff &amp; Palmer 2019 &middot; The Trust Project<\/li>\n            <\/ul>\n        <\/div>\n\n        <div class=\"appendix-section\">\n            <h3>5. Competitive White Space &mdash; 50+ Product Scan<\/h3>\n            <p><strong>Zero products combine all four axes:<\/strong> spaced repetition, quizzes on news, human editorial curation, and source transparency.<\/p>\n            <ul>\n                <li><span class=\"tag\">Competitor<\/span> <strong>Morning Brew<\/strong> (4M+ subs, acquired ~$75M) &mdash; No depth, no retention<\/li>\n                <li><span class=\"tag\">Competitor<\/span> <strong>Tortoise Media<\/strong> (110K+ paying members) &mdash; Closest in philosophy, no learning science<\/li>\n                <li><span class=\"tag\">Competitor<\/span> <strong>Ground News<\/strong> (1M+ users) &mdash; Transparency via bias ratings, zero retention mechanics<\/li>\n                <li><span class=\"tag\">Competitor<\/span> <strong>Stratechery<\/strong> ($15/mo, 40K+ paid) &mdash; Deep analysis, no retention mechanics<\/li>\n                <li><span class=\"tag\">Competitor<\/span> <strong>GeoBarta<\/strong> (launched 2026) &mdash; Only partial overlap; geography not news, no editorial curation<\/li>\n            <\/ul>\n        <\/div>\n\n        <div class=\"appendix-section\">\n            <h3>6. Newsletter Economics &amp; Monetization<\/h3>\n            <p>Personality-driven newsletters convert <strong>6&ndash;12% free-to-paid<\/strong> vs. 2&ndash;5% for brand-driven. Annual subscriber survival: <strong>70% for annual plans vs. 34% for monthly<\/strong> (FT Strategies).<\/p>\n            <ul>\n                <li><span class=\"tag\">Case<\/span> <strong>The Free Press<\/strong> &mdash; 170K paid / 1.5M total = 11.3% conversion, ~$20M/year<\/li>\n                <li><span class=\"tag\">Case<\/span> <strong>Morning Brew<\/strong> &mdash; Acquired ~$75M &middot; <strong>Axios<\/strong> &mdash; Acquired $525M<\/li>\n                <li><span class=\"tag\">Data<\/span> C3 model: $10/month, 3&ndash;5% conversion from 10K list = $36K&ndash;$60K/year in Year 1<\/li>\n                <li><span class=\"tag\">Source<\/span> Substack/ConvertKit benchmarks &middot; Reuters &ldquo;Paying for News&rdquo; 2023 &middot; FT Strategies<\/li>\n            <\/ul>\n        <\/div>\n\n        <div class=\"appendix-section\">\n            <h3>7. Audience &amp; Demographics<\/h3>\n            <p>News payers skew older, educated, higher income: 60% male, 79% medium-to-high income. Brett&rsquo;s science YouTube audience (65&ndash;93% male, 25&ndash;36 age band) maps directly onto the demographic that already pays for online news.<\/p>\n            <ul>\n                <li><span class=\"tag\">Source<\/span> <a href=\"https://reutersinstitute.politics.ox.ac.uk/digital-news-report\" target=\"_blank\">Reuters DNR 2023&ndash;2025<\/a> &middot; Pew 2025&ndash;2026 &middot; <a href=\"https://pmc.ncbi.nlm.nih.gov/articles/PMC8668831/\" target=\"_blank\">Landrum 2021<\/a><\/li>\n            <\/ul>\n        <\/div>\n\n        <div class=\"appendix-section\">\n            <h3>8. Client Context<\/h3>\n            <ul>\n                <li><span class=\"tag\">Data<\/span> Meeting #1 with Brett &mdash; 14+ daily news sources, editorial preferences, WhatsApp curation habits<\/li>\n                <li><span class=\"tag\">Data<\/span> Meeting #5 with Farid &mdash; 4-dimension scorecard requirement, presentations under 3 minutes, MLP framing<\/li>\n                <li><span class=\"tag\">Data<\/span> Meeting #7 &mdash; HMW brainstorming, final 3 concepts selected<\/li>\n            <\/ul>\n        <\/div>\n\n        <a class=\"back-to-slides\" id=\"backToSlides\">&uarr; Back to presentation<\/a>\n    <\/div>\n<\/div>\n<\/div>\n\n<script>\n    // \u2500\u2500\u2500 VIEW SWITCHING \u2500\u2500\u2500\n    let previousView = 'view-overview';\n    let inAppendixMode = false;\n    const appendixPill = document.getElementById('appendixPill');\n\n    function showView(viewId) {\n        // Reset appendix state\n        if (inAppendixMode) {\n            inAppendixMode = false;\n            appendixPill.textContent = 'Appendix';\n            appendixPill.classList.remove('in-appendix');\n        }\n        // Remember where we came from (not appendix)\n        const current = document.querySelector('.view.active');\n        if (current && current.id !== 'view-appendix') previousView = current.id;\n        // Switch views\n        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));\n        document.getElementById(viewId).classList.add('active');\n        // Set scroll mode\n        if (viewId === 'view-overview' || viewId === 'view-appendix') {\n            document.body.style.overflow = 'auto';\n            window.scrollTo(0, 0);\n        } else {\n            document.body.style.overflow = 'hidden';\n            const sc = document.querySelector('#' + viewId + ' .slides-container');\n            if (sc) sc.scrollTo(0, 0);\n        }\n        if (viewId === 'view-appendix') {\n            inAppendixMode = true;\n            appendixPill.textContent = '\\u2191 Back';\n            appendixPill.classList.add('in-appendix');\n        }\n    }\n\n    // \u2500\u2500\u2500 PER-VIEW NAV DOTS \u2500\u2500\u2500\n    document.querySelectorAll('.view:not(#view-overview):not(#view-appendix)').forEach(view => {\n        const sc = view.querySelector('.slides-container');\n        if (!sc) return;\n        const slides = sc.querySelectorAll('.slide');\n        const dots = view.querySelectorAll('.nav-dot');\n        dots.forEach((dot, i) => {\n            dot.addEventListener('click', () => {\n                if (slides[i]) slides[i].scrollIntoView({ behavior: 'smooth' });\n            });\n        });\n        const obs = new IntersectionObserver(entries => {\n            entries.forEach(e => {\n                if (e.isIntersecting) {\n                    const idx = Array.from(slides).indexOf(e.target);\n                    dots.forEach((d, i) => d.classList.toggle('active', i === idx));\n                }\n            });\n        }, { root: sc, threshold: 0.5 });\n        slides.forEach(s => obs.observe(s));\n    });\n\n    // \u2500\u2500\u2500 APPENDIX PILL (context-aware) \u2500\u2500\u2500\n    appendixPill.addEventListener('click', () => {\n        if (inAppendixMode) {\n            showView(previousView);\n        } else {\n            // Determine which concept we're in\n            const active = document.querySelector('.view.active');\n            const conceptId = active ? active.id : '';\n            showView('view-appendix');\n            // Scroll to concept-specific section after view switch\n            const anchorMap = { 'view-c1': 'appendix-c1', 'view-c2': 'appendix-c2', 'view-c3': 'appendix-c3' };\n            const anchor = anchorMap[conceptId];\n            if (anchor) {\n                setTimeout(() => {\n                    document.getElementById(anchor).scrollIntoView({ behavior: 'smooth', block: 'start' });\n                }, 50);\n            }\n        }\n    });\n\n    // \u2500\u2500\u2500 \"MORE LINK\" ANCHORS \u2192 APPENDIX \u2500\u2500\u2500\n    document.querySelectorAll('a[href^=\"#appendix\"]').forEach(link => {\n        link.addEventListener('click', e => {\n            e.preventDefault();\n            showView('view-appendix');\n        });\n    });\n\n    // \u2500\u2500\u2500 BACK TO SLIDES \u2500\u2500\u2500\n    document.getElementById('backToSlides').addEventListener('click', e => {\n        e.preventDefault();\n        showView(previousView);\n    });\n\n    // \u2500\u2500\u2500 KEYBOARD NAVIGATION \u2500\u2500\u2500\n    document.addEventListener('keydown', e => {\n        const active = document.querySelector('.view.active');\n        if (!active) return;\n        const id = active.id;\n\n        // In overview or appendix \u2014 Escape goes back\n        if (id === 'view-overview' || id === 'view-appendix') {\n            if (e.key === 'Escape' && id === 'view-appendix') showView(previousView);\n            return;\n        }\n\n        // In a concept view \u2014 arrow keys navigate slides\n        const sc = active.querySelector('.slides-container');\n        if (!sc) return;\n        const slides = Array.from(sc.querySelectorAll('.slide'));\n        const dots = Array.from(active.querySelectorAll('.nav-dot'));\n        const currentIdx = dots.findIndex(d => d.classList.contains('active'));\n\n        if (e.key === 'ArrowDown' || e.key === 'ArrowRight' || e.key === ' ') {\n            e.preventDefault();\n            const next = currentIdx + 1;\n            if (next < slides.length) slides[next].scrollIntoView({ behavior: 'smooth' });\n        } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {\n            e.preventDefault();\n            const prev = currentIdx - 1;\n            if (prev >= 0) slides[prev].scrollIntoView({ behavior: 'smooth' });\n        } else if (e.key === 'Escape') {\n            showView('view-overview');\n        } else if (e.key === 'Home') {\n            e.preventDefault();\n            slides[0].scrollIntoView({ behavior: 'smooth' });\n        } else if (e.key === 'End') {\n            e.preventDefault();\n            slides[slides.length - 1].scrollIntoView({ behavior: 'smooth' });\n        }\n    });\n\n    // Start on overview (scrollable)\n    document.body.style.overflow = 'auto';\n<\/script>\n\n<script>\n(function() {\n  var orig = window.showView;\n  window.showView = function(v) {\n    if (orig) orig(v);\n    window.parent.postMessage({type:'view-change',viewId:v}, '*');\n    setTimeout(detect, 200);\n  };\n  var cur = null;\n  function detect() {\n    var active = document.querySelector('.view.active');\n    if (!active) return;\n    var best = null, bestV = 0;\n    active.querySelectorAll('.slide[id]').forEach(function(s) {\n      var r = s.getBoundingClientRect();\n      var v = Math.max(0, Math.min(r.bottom, window.innerHeight) - Math.max(r.top, 0));\n      if (v > bestV) { bestV = v; best = s; }\n    });\n    if (best && best.id !== cur) {\n      cur = best.id;\n      window.parent.postMessage({type:'slide-change',slideId:best.id}, '*');\n    }\n  }\n  document.addEventListener('DOMContentLoaded', function() {\n    document.querySelectorAll('.slides-container').forEach(function(c) {\n      c.addEventListener('scroll', detect, {passive:true});\n    });\n    setTimeout(detect, 400);\n  });\n})();\n<\/script>\n<\/body>\n<\/html>\n";
var notesHTML = "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>Brett Presentation \u2014 Speaker Notes<\/title>\n<style>\n  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&display=swap');\n\n  :root {\n    --bg: #0c0c0f;\n    --surface: #131318;\n    --surface2: #1a1a22;\n    --border: #22222e;\n    --text: #e4e4f0;\n    --muted: #52526a;\n    --soft: #9090a8;\n    --c1: #4f8fff;\n    --c2: #ff5050;\n    --c3: #f5c842;\n    --green: #4fdc8a;\n    --purple: #a78bfa;\n  }\n\n  * { box-sizing: border-box; margin: 0; padding: 0; }\n\n  body {\n    background: var(--bg);\n    color: var(--text);\n    font-family: 'DM Mono', monospace;\n    font-size: 15px;\n    line-height: 1.75;\n    padding: 32px 28px 60px;\n    max-width: 920px;\n    margin: 0 auto;\n  }\n\n  .top-header {\n    display: flex;\n    align-items: baseline;\n    justify-content: space-between;\n    border-bottom: 1px solid var(--border);\n    padding-bottom: 18px;\n    margin-bottom: 24px;\n  }\n  .top-header h1 {\n    font-family: 'Syne', sans-serif;\n    font-size: 17px;\n    font-weight: 800;\n    letter-spacing: -0.3px;\n  }\n  .top-header span { font-size: 11px; color: var(--muted); }\n\n  .timer-row {\n    display: flex;\n    gap: 6px;\n    flex-wrap: wrap;\n    margin-bottom: 32px;\n  }\n  .t-pill {\n    background: var(--surface);\n    border: 1px solid var(--border);\n    border-radius: 4px;\n    padding: 4px 11px;\n    font-size: 11px;\n    color: var(--muted);\n  }\n  .t-pill b { color: var(--text); }\n\n  .section { margin-bottom: 44px; }\n\n  .section-title {\n    font-family: 'Syne', sans-serif;\n    font-size: 12px;\n    font-weight: 800;\n    letter-spacing: 2px;\n    text-transform: uppercase;\n    color: var(--muted);\n    display: flex;\n    align-items: center;\n    gap: 10px;\n    margin-bottom: 18px;\n  }\n  .section-title::after {\n    content: '';\n    flex: 1;\n    height: 1px;\n    background: var(--border);\n  }\n  .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }\n  .c1  { background: var(--c1); }\n  .c2  { background: var(--c2); }\n  .c3  { background: var(--c3); }\n  .cw  { background: var(--text); }\n  .cg  { background: var(--green); }\n\n  .slide {\n    background: var(--surface);\n    border: 1px solid var(--border);\n    border-radius: 10px;\n    margin-bottom: 10px;\n    overflow: hidden;\n  }\n\n  .slide-header {\n    padding: 12px 18px 10px;\n    border-bottom: 1px solid var(--border);\n    display: flex;\n    align-items: center;\n    justify-content: space-between;\n  }\n  .slide-name {\n    font-family: 'Syne', sans-serif;\n    font-size: 14px;\n    font-weight: 700;\n    color: var(--text);\n  }\n  .slide-meta { font-size: 12px; color: var(--muted); }\n\n  .slide-body { padding: 16px 18px 18px; }\n\n  .b-c1 { border-left: 3px solid var(--c1); }\n  .b-c2 { border-left: 3px solid var(--c2); }\n  .b-c3 { border-left: 3px solid var(--c3); }\n  .b-cw { border-left: 3px solid #444460; }\n\n  .say {\n    background: rgba(78,220,138,0.05);\n    border: 1px solid rgba(78,220,138,0.12);\n    border-radius: 6px;\n    padding: 14px 18px;\n    font-size: 15px;\n    line-height: 1.8;\n    color: #c4c4dc;\n    margin-bottom: 12px;\n  }\n  .say b { color: var(--text); }\n  .say i { color: var(--green); font-style: normal; }\n\n  .context {\n    background: var(--surface2);\n    border: 1px solid var(--border);\n    border-radius: 6px;\n    padding: 12px 16px;\n    margin-bottom: 10px;\n  }\n  .context-label {\n    font-size: 10px;\n    font-weight: 700;\n    letter-spacing: 1.5px;\n    text-transform: uppercase;\n    color: var(--muted);\n    margin-bottom: 6px;\n  }\n  .context p {\n    font-size: 13px;\n    color: var(--soft);\n    line-height: 1.75;\n  }\n  .context p b { color: var(--text); }\n\n  .insight-grid {\n    display: grid;\n    grid-template-columns: 1fr 1fr;\n    gap: 8px;\n    margin-bottom: 12px;\n  }\n  .insight {\n    background: var(--surface2);\n    border: 1px solid var(--border);\n    border-radius: 8px;\n    padding: 12px 14px;\n  }\n  .insight-stat {\n    font-family: 'Syne', sans-serif;\n    font-size: 20px;\n    font-weight: 800;\n    line-height: 1;\n    margin-bottom: 4px;\n  }\n  .insight-title {\n    font-size: 12px;\n    font-weight: 500;\n    color: var(--text);\n    margin-bottom: 5px;\n  }\n  .insight-body {\n    font-size: 12px;\n    color: var(--soft);\n    line-height: 1.65;\n  }\n  .insight-body b { color: var(--text); }\n\n  .score-row {\n    display: flex;\n    gap: 8px;\n    flex-wrap: wrap;\n    margin-bottom: 12px;\n  }\n  .score-pill {\n    background: var(--surface2);\n    border: 1px solid var(--border);\n    border-radius: 6px;\n    padding: 8px 14px;\n    text-align: center;\n    min-width: 80px;\n  }\n  .score-num {\n    font-family: 'Syne', sans-serif;\n    font-size: 18px;\n    font-weight: 800;\n  }\n  .score-label { font-size: 10px; color: var(--muted); margin-top: 2px; }\n\n  .tip {\n    font-size: 12px;\n    color: var(--muted);\n    padding: 8px 0 0;\n    border-top: 1px solid var(--border);\n    margin-top: 8px;\n  }\n  .tip b { color: #7a7a9a; }\n\n  .transition {\n    background: rgba(78,220,138,0.04);\n    border: 1px dashed rgba(78,220,138,0.2);\n    border-radius: 6px;\n    padding: 10px 16px;\n    font-size: 13px;\n    color: var(--muted);\n    margin: 4px 0 20px;\n  }\n  .transition b { color: var(--green); }\n\n  .qa-grid {\n    display: grid;\n    grid-template-columns: 1fr 1fr;\n    gap: 8px;\n  }\n  .qa {\n    background: var(--surface);\n    border: 1px solid var(--border);\n    border-radius: 8px;\n    padding: 14px;\n  }\n  .qa-q {\n    font-family: 'Syne', sans-serif;\n    font-size: 12px;\n    font-weight: 700;\n    color: var(--muted);\n    margin-bottom: 7px;\n  }\n  .qa-a { font-size: 13px; color: var(--text); line-height: 1.65; }\n\n  .footer {\n    margin-top: 40px;\n    border-top: 1px solid var(--border);\n    padding-top: 18px;\n    display: flex;\n    gap: 14px;\n    flex-wrap: wrap;\n  }\n  .reminder {\n    background: var(--surface);\n    border: 1px solid var(--border);\n    border-radius: 6px;\n    padding: 10px 14px;\n    font-size: 11px;\n    color: var(--soft);\n    flex: 1;\n    min-width: 200px;\n  }\n  .reminder b { color: var(--text); display: block; margin-bottom: 3px; }\n<\/style>\n<\/head>\n<body>\n\n<div class=\"top-header\">\n  <h1>Brett Moore \u2014 Presentation Cheat Sheet<\/h1>\n  <span>30 min \u00b7 screen share<\/span>\n<\/div>\n\n<div class=\"timer-row\">\n  <div class=\"t-pill\">00:00 <b>Opening<\/b><\/div>\n  <div class=\"t-pill\">01:00 <b>C1 starts<\/b><\/div>\n  <div class=\"t-pill\">07:00 <b>C2 starts<\/b><\/div>\n  <div class=\"t-pill\">14:00 <b>C3 starts<\/b><\/div>\n  <div class=\"t-pill\">21:00 <b>Comparison<\/b><\/div>\n  <div class=\"t-pill\">24:00 <b>Brett reacts / Q&A<\/b><\/div>\n<\/div>\n\n\n<!-- OPENING -->\n<div class=\"section\">\n  <div class=\"section-title\"><div class=\"dot cw\"><\/div> Opening<\/div>\n\n  <div id=\"note-overview\" class=\"slide b-cw\">\n    <div class=\"slide-header\">\n      <span class=\"slide-name\">Overview page<\/span>\n      <span class=\"slide-meta\">~1 min<\/span>\n    <\/div>\n    <div class=\"slide-body\">\n      <div class=\"say\">\"We explored <b>three distinct paths<\/b> \u2014 not three versions of the same idea. One solves the production problem. One creates an entirely new format. One reimagines how people consume and actually remember news. I'll walk through each in order, then we compare.\"<\/div>\n      <div class=\"context\">\n        <div class=\"context-label\">Why say it this way<\/div>\n        <p>Brett needs to know upfront these aren't flavors of the same product. Setting up 3 different <b>problem framings<\/b> means he'll evaluate each on its own terms \u2014 not just pick the one that sounds most like what he already planned. Briefly show the comparison table, then say <b>\"we'll come back to this at the end\"<\/b> so it doesn't distract now.<\/p>\n      <\/div>\n    <\/div>\n  <\/div>\n<\/div>\n\n\n<!-- C1 -->\n<div class=\"section\">\n  <div class=\"section-title\"><div class=\"dot c1\"><\/div> C1 \u2014 Brett on Autopilot<\/div>\n\n  <div id=\"note-c1-title\" class=\"slide b-c1\">\n    <div class=\"slide-header\">\n      <span class=\"slide-name\">Title slide<\/span>\n      <span class=\"slide-meta\">30 sec<\/span>\n    <\/div>\n    <div class=\"slide-body\">\n      <div class=\"say\">\"This is the <b>due diligence concept<\/b>. If you asked 10 consultants what to build for a subject-matter expert with a big following, 8 would say this \u2014 an AI pipeline that lets you publish a daily podcast solo, in under an hour.\"<\/div>\n      <div class=\"context\">\n        <div class=\"context-label\">Why frame it as \"the obvious answer\"<\/div>\n        <p>Calling it the conventional choice upfront is not a negative \u2014 it's honest positioning. It sets Brett's expectations so that when C2 and C3 come up, those feel more interesting by contrast. It also signals you're not trying to sell him one thing \u2014 you're doing real analysis.<\/p>\n      <\/div>\n    <\/div>\n  <\/div>\n\n  <div id=\"note-c1-problem\" class=\"slide b-c1\">\n    <div class=\"slide-header\">\n      <span class=\"slide-name\">Problem \u2014 47% of podcasts die before episode 3<\/span>\n      <span class=\"slide-meta\">45 sec<\/span>\n    <\/div>\n    <div class=\"slide-body\">\n      <div class=\"say\">\"<b>47% of podcasts die before episode 3.<\/b> The problem isn't ideas \u2014 you already read 14+ sources every day. The bottleneck is production time: a traditional episode takes 4\u20138 hours of research, scripting, editing, and publishing. At $150\u2013200 per month, AI pipelines now make the economics work for a solo operator.\"<\/div>\n      <div class=\"context\">\n        <div class=\"context-label\">Pause on \"14+ sources\"<\/div>\n        <p>That number directly validates <b>Brett's existing daily workflow<\/b>. He already does the hard editorial work \u2014 curating, reading, forming an opinion. The pipeline just automates everything downstream of that judgment. Emphasising this shows you understood his situation before building the concept.<\/p>\n      <\/div>\n    <\/div>\n  <\/div>\n\n  <div id=\"note-c1-insights\" class=\"slide b-c1\">\n    <div class=\"slide-header\">\n      <span class=\"slide-name\">4 Insights<\/span>\n      <span class=\"slide-meta\">90 sec \u2014 keep fast, 20 sec each<\/span>\n    <\/div>\n    <div class=\"slide-body\">\n      <div class=\"insight-grid\">\n        <div class=\"insight\">\n          <div class=\"insight-stat\" style=\"color:var(--c2)\">68\u201384%<\/div>\n          <div class=\"insight-title\">Washington Post AI Podcast Failure<\/div>\n          <div class=\"insight-body\"><b>What happened:<\/b> In 2023, The Washington Post launched a fully AI-generated podcast \u2014 no human editor reviewed the scripts. Internal audits found that <b>68\u201384% of scripts contained fabricated quotes or factual errors<\/b>. The product was quietly pulled within months.<br><br><b>What it means for Brett:<\/b> AI-assisted is viable. AI-automated without human review is a legal and reputational risk. Brett stays in the editorial loop \u2014 that's what makes this safe and credible.<\/div>\n        <\/div>\n        <div class=\"insight\">\n          <div class=\"insight-stat\" style=\"color:var(--c1)\">$150\u2013200<\/div>\n          <div class=\"insight-title\">Monthly pipeline cost<\/div>\n          <div class=\"insight-body\">A composable stack: <b>n8n<\/b> (workflow automation, connects all tools) + <b>GPT-4o<\/b> (script drafting from source summaries) + <b>ElevenLabs<\/b> (optional voice cloning for intros/outros) + <b>Buzzsprout<\/b> (podcast hosting + auto-distribution to Spotify, Apple, YouTube). <b>Break-even: just 15
